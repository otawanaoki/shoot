              // 周囲も少しだけ割れる。隊列が生きている感じを出す。
              enemies.forEach(o => {
                const d = Math.hypot(o.x - e.x, o.y - e.y);
                if (o !== e && o.state === 'active' && d < 62) {
                  o.x += dodgeDir * 5;
                  o.evadeOffsetX += dodgeDir * 24;
                  o.evadeOffsetY += 5;
                }
              });
              break;
            }
          }
        }

        const nearPlayer = Math.hypot(player.x - e.x, player.y - e.y) < 100;
        if (e.state === 'sleep' && nearPlayer) e.alert += 0.015;
        if (e.alert > 1) e.state = 'active';

        const formationShift = Math.sin(time * 0.025) * 28;

        if (e.state === 'sleep') {
          e.x += (e.homeX + Math.sin(time * 0.018 + e.phase) * 3 + e.evadeOffsetX - e.x) * 0.04;
          e.y += (e.homeY + Math.cos(time * 0.015 + e.phase) * 2 + e.evadeOffsetY - e.y) * 0.04;
        } else if (e.state === 'active') {
          e.diveDelay--;

          if (isScrambleMode(e)) {
            // スクランブル中は隊列位置へ戻さない。
            // 上方で軽く漂い、準備ができたら個別に再突入する。
            e.x += Math.sin(time * 0.035 + e.phase) * 0.45;
            e.y += Math.cos(time * 0.028 + e.phase) * 0.20;
          } else {
            e.x += (e.homeX + formationShift + e.evadeOffsetX - e.x) * 0.075;
            e.y += (e.homeY + 15 + Math.sin(time * 0.018 + e.phase) * 4 + e.evadeOffsetY - e.y) * 0.075;
          }

          const scramble = isScrambleMode(e);
          const scrambleCanLaunch = scramble && countActiveDivers() < SCRAMBLE.maxSimultaneousDivers;
          const commanderAlive = enemies.some(o => o.role === 'commander' && o.state !== 'gone');
          const guardHeldForCommander = !scramble && e.role === 'guard' && commanderAlive;
          if (!guardHeldForCommander && e.diveDelay <= 0 && ((scrambleCanLaunch && Math.random() < 0.55) || (!scramble && idx % 5 === Math.floor(time / 200) % 5))) {
            e.state = 'dive';
            e.diveT = 0;

            // 突撃開始時にだけ軌道を決める。
            // その後プレイヤーが動いても、この曲線は変えない。
            const dir = (isScrambleMode(e) ? e.x : e.homeX) < W / 2 ? 1 : -1;
            e.diveDir = dir;
            e.diveStartX = e.x;
            e.diveStartY = e.y;
            // 最初の制御点はかなり外側。ここではまだプレイヤー前を横切らない。
            // まず大きく外へ膨らみ、その後に一度だけ攻撃線へ入る。
            if (e.type === 'purple') {
              // 紫機：横へ大きく張り出す側面制圧コース。
              e.diveControlX = e.x + dir * Math.min(W * SETTINGS.purpleSpread, 470);
              e.diveControlY = battleH * 0.12;
            } else if (e.type === 'commander' || e.type === 'guard') {
              // 編隊長・護衛：あまり強すぎない、格のある大きめの弧。
              e.diveControlX = e.x + dir * Math.min(W * 0.55, 260);
              e.diveControlY = battleH * 0.16;
            } else {
              e.diveControlX = e.x + dir * Math.min(W * (isScrambleMode(e) ? 0.56 : 0.72), isScrambleMode(e) ? 260 : 320);
              e.diveControlY = isScrambleMode(e) ? battleH * 0.12 : battleH * 0.18;
            }

            // 目標は自機そのものではなく、自機をかすめた先の「画面外ライン」。
            // これで攻撃線を最後まで飛び切る。
            // 通常機は、自機そのものではなく「射撃位置」を通る。
            // 弾は別途、自機を狙って撃つので、軌道には少しばらつきを持たせる。
            const passSide = (Math.random() < 0.5 ? -1 : 1);

            // 通常機は自機に当たりに来るのではなく、
            // 自機の「前」を明確に横切る射撃コースにする。
            // これでプレイヤーは落ち着いて撃てるし、隊列離脱の美しさも見える。
            let passX;
            let passY;
            if (e.type === 'purple') {
              // 紫機は前方の横を大きく切る。正面維持を崩すための軌道。
              passX = passSide * (150 + Math.random() * 95);
              passY = -58 - Math.random() * 42;
            } else if (e.type === 'commander' || e.type === 'guard') {
              passX = passSide * (92 + Math.random() * 52);
              passY = -68 - Math.random() * 30;
            } else {
              passX = passSide * (76 + Math.random() * 54);
              passY = -74 - Math.random() * 34;
            }
            e.diveAimX = player.x + passX;
            e.diveAimY = player.y + passY;

            // インパクト型。
            // 最初から警告するのではなく、外へ膨らんだ後に一度だけ軌道修正して、
            // そのタイミングで IMPACT 表示を出す。
            e.impactType = (e.type === 'purple' || e.type === 'commander' || e.type === 'guard') ? false : (Math.random() < 0.28);
            e.impactAdjusted = false;
            e.impactWarned = false;
            e.impactWarningLife = 0;

            // 下へ落とさず、横方向の画面外ラインへ抜ける。
            // 純粋にベジェ曲線の形だけで飛ばす。
            e.diveTargetX = dir > 0 ? W + 90 : -90;
            e.diveTargetY = player.y + 8;
            e.returnWait = 0;

            // 飛行中に撃つタイミング。発射時点の自機位置へ向ける。
            e.fireTimes = [70, 105, 138];
            e.firedShots = 0;

            // 間合いを取って下がる自機に対し、攻撃終了時に必要なら一度だけ再攻撃する。
            e.rediveCount = 0;
            e.rediveMax = isScrambleMode(e) ? SCRAMBLE.rediveMax : 1;

            // 編隊長が出撃するときは、護衛を4〜5機つれた「インチキフォーメーション」で発進。
            // 護衛が削られていても、隊列に護衛が1機でも残っていれば補充がワープインする。
            if (e.role === 'commander' && !e.sortieGroupStarted) {
              e.sortieGroupStarted = true;

              const escortOffsets = [
                { x: -42, y: 26 },
                { x:  42, y: 26 },
                { x: -22, y: 52 },
                { x:  22, y: 52 },
                { x:   0, y: 72 }
              ];

              let guards = enemies
                .filter(g => g.role === 'guard' && (g.state === 'sleep' || g.state === 'active') && g.guardingCommanderId === e.commanderId)
                .sort((a, b) => Math.abs(a.homeX - e.homeX) - Math.abs(b.homeX - e.homeX));

              const hadAnyGuard = guards.length > 0;
              const targetEscortCount = hadAnyGuard ? 5 : Math.min(2, guards.length);

              // 1機でも護衛が残っていれば、足りない分を補充する。
              if (hadAnyGuard) {
                for (let gi = guards.length; gi < targetEscortCount; gi++) {
                  const off = escortOffsets[gi] || { x: 0, y: 60 };
                  guards.push(spawnReinforcementGuard(e, off.x, off.y));
                }
              }

              guards = guards.slice(0, targetEscortCount);

              guards.forEach((g, gi) => {
                const off = escortOffsets[gi] || { x: (gi - 2) * 28, y: 58 };
                g.state = 'dive';
                g.diveT = 0;
                g.sortieGroupStarted = true;
                g.diveDir = e.diveDir;

                // 同じ曲線を共有しつつ、相対位置を保つ。
                g.diveStartX = e.diveStartX + off.x;
                g.diveStartY = e.diveStartY + off.y;
                g.diveControlX = e.diveControlX + off.x * 0.82;
                g.diveControlY = e.diveControlY + off.y * 0.82;
                g.diveAimX = e.diveAimX + off.x;
                g.diveAimY = e.diveAimY + off.y;
                g.diveTargetX = e.diveTargetX + off.x;
                g.diveTargetY = e.diveTargetY + off.y;

                g.impactType = false;
                g.impactAdjusted = false;
                g.impactWarned = false;
                g.impactWarningLife = 0;
                g.returnWait = 0;

                // 護衛は控えめに撃つが、数で圧を出す。
                g.fireTimes = gi < 2 ? [86, 128] : [110];
                g.firedShots = 0;
                g.rediveCount = 0;
                g.rediveMax = 1;
              });
            }
            e.coastVX = 0;
            e.coastVY = 0;
          }
        } else if (e.state === 'dive') {
          e.diveT++;
          const t = e.diveT;

          // ギャラクシアン風：周期的なサインではなく、1回だけの放物線的な攻撃軌道。
          // 1) 隊列から外へ膨らむ
          // 2) プレイヤーの前を横切る／当たりに来る
          // 3) そのまま画面下へ抜ける
          const dir = e.diveDir || (e.homeX < W / 2 ? 1 : -1);
          // 赤(enemy.type==='angry')は「メテオ」型。
          // 編隊機とは別に、強い推力で一直線気味に突っ込む。
          if (e.type === 'angry') {
            if (!e.meteorInit) {
              e.meteorInit = true;

              const dx = player.x - e.x;
              const dy = player.y - e.y;
              const d = Math.hypot(dx, dy) || 1;

              // 初期照準のみ。途中追尾はしない。
              e.meteorVX = dx / d * 12.8;
              e.meteorVY = dy / d * 12.8;

              // メテオ警告。実座標上に予測線を投影する。
              // 警告中は予兆だけで、当たり判定・撃破判定は無効。
              e.warningTimer = 84;
              e.meteorLaunched = false;
              meteorWarnings.push({
                enemy: e,
                x1: e.x,
                y1: e.y,
                x2: e.x + (dx / d) * 1200,
                y2: e.y + (dy / d) * 1200,
                life: 84
              });
            }

            // 警告中は停止して予測線だけを表示。
            // 飛び出した瞬間から当たり判定・撃破判定が有効になる。
            if (e.warningTimer > 0) {
              e.warningTimer--;
            } else {
              e.meteorLaunched = true;

              // メテオは弾を撃たない。高速で一撃離脱する。
              e.meteorVX *= 1.0008;
              e.meteorVY *= 1.0008;
              e.x += e.meteorVX;
              e.y += e.meteorVY;
            }

            // 画面外へ抜けたら隊列には戻らず消える。
            if (e.x < -180 || e.x > W + 180 || e.y < -180 || e.y > battleH + 180) {
              e.state = 'gone';
              e.meteorInit = false;
              e.meteorLaunched = false;
            }

          } else {

          const progress = Math.min(1, t / 230);
          const ease = progress; // 通常機の突撃は等速寄りにして、狙いやすくする。

          // インパクト型：
          // 以前はここで diveAim をプレイヤー座標へ差し替えていたため、
          // ベジェ曲線が途中で切り替わり「ワープ」したようなギクシャクが出ていた。
          // いまは軌道変更はせず、警告UIだけ出す。
          if (e.impactType && !e.impactAdjusted && progress > 0.30) {
            e.impactAdjusted = true;
            e.impactWarned = true;
            e.impactWarningLife = 150;
          }

          let startX = e.diveStartX ?? e.homeX;
          let startY = e.diveStartY ?? e.homeY + 15;
          let controlX = e.diveControlX ?? e.homeX + dir * Math.min(W * 0.56, 240);
          let controlY = e.diveControlY ?? battleH * 0.26;
          let aimX = e.diveAimX ?? player.x + dir * 18;
          let aimY = e.diveAimY ?? player.y + 36;
          let targetX = e.diveTargetX ?? (dir > 0 ? W + 90 : -90);
          let targetY = e.diveTargetY ?? player.y + 8;

          const attackPointX = aimX;
          const attackPointY = aimY;

          // 通常機のみ：膨らんだ後、まだ自機が敵の前方にいるなら一度だけ曲線を作り直す。
          // 下がりながら間合いを取るプレイに対して、敵がもう一度攻撃線を取り直す。
          // 自機がまだ敵の進行方向の前方に残っているなら、再照準する。
          // 通常機も1回だけ行う。精鋭機は2回まで。
          const canRedive = false; // 再照準は攻撃終了ポイントでだけ判定する。
          const playerStillAhead = player.y < e.y + 115 && player.y > e.y - 160;
          const playerInLane = Math.abs(player.x - e.x) < 260;
          if (canRedive && playerStillAhead && playerInLane) {
            e.rediveCount = (e.rediveCount || 0) + 1;
            e.diveT = 0;

            const side2 = player.x < e.x ? -1 : 1;
            e.diveDir = side2;
            e.diveStartX = e.x;
            e.diveStartY = e.y;
            if (e.type === 'purple') {
              e.diveControlX = e.x + side2 * Math.min(W * 0.62, 330);
              e.diveControlY = e.y - 98;
            } else {
              e.diveControlX = e.x + side2 * Math.min(W * (isScrambleMode(e) ? 0.36 : 0.44), isScrambleMode(e) ? 190 : 220);
              e.diveControlY = e.y - (isScrambleMode(e) ? 96 : 74);
            }

            // 再照準しても基本は「前を横切る」。完全体当たりにはしない。
            e.diveAimX = player.x + side2 * (58 + Math.random() * 42);
            e.diveAimY = player.y - 48 - Math.random() * 26;
            e.diveTargetX = side2 > 0 ? W + 140 : -140;
            e.diveTargetY = player.y + 6;
            return;
          }

          if (ease < 0.58) {
            // 前半：隊列 → 外側へ膨らむ → 自機前を必ず横切る
            const p = ease / 0.58;
            const q = 1 - p;
            e.x = q * q * startX
                + 2 * q * p * controlX
                + p * p * attackPointX;
            e.y = q * q * startY
                + 2 * q * p * controlY
                + p * p * attackPointY;
          } else {
            // 後半：attackPoint以降は終端方向へ惰性で抜ける。
            // 惰性は高速化するので、後退しながら追い越しにくい。
            const p = (ease - 0.58) / 0.42;

            const tangentX = attackPointX - controlX;
            const tangentY = attackPointY - controlY;
            const len = Math.hypot(tangentX, tangentY) || 1;
            const ux = tangentX / len;
            const uy = tangentY / len;

            const scrambleSpeed = isScrambleMode(e) ? SCRAMBLE.speedBonus : 1.0;
            const coastDistance = Math.min(W * 1.35, 620) * (p + p * p * 0.55) * scrambleSpeed;
            e.x = attackPointX + ux * coastDistance;
            e.y = attackPointY + uy * coastDistance;
            e.coastVX = ux * (8 + p * 10);
            e.coastVY = uy * (8 + p * 10);
          }


          // 突撃中にパラパラ撃つ。各弾は「発射時点の自機位置」へ直進する。
          if (e.fireTimes && e.firedShots < e.fireTimes.length && t >= e.fireTimes[e.firedShots]) {
            enemyShoot(e);
            e.firedShots++;
          }

          // 自機付近を通過した後は警告を消す。
          if (e.impactWarned) {
            e.impactWarningLife = Math.max(0, (e.impactWarningLife || 0) - 1);
            const passedAttackPoint = ease >= 0.62;
            const passedPlayer = Math.hypot(e.x - player.x, e.y - player.y) > 90 && e.y > player.y - 30;
            if (passedAttackPoint || passedPlayer || e.impactWarningLife <= 0) {
              e.impactWarned = false;
              e.impactWarningLife = 0;
            }
          }

          if (progress >= 1 || e.x < -160 || e.x > W + 160 || e.y < -160 || e.y > battleH + 160) {
            e.impactWarned = false;
            e.impactWarningLife = 0;

            // 攻撃終了ポイントで、まだ自機を追い越していなければ一度だけ流れで再攻撃。
            // 画面座標では「敵が自機より上側に残っている」なら、まだ抜き切っていない扱い。
            const hasNotPassedPlayer = e.y < player.y - 18;
            const canEndRedive = !e.impactType && (e.rediveCount || 0) < (e.rediveMax || 1) && hasNotPassedPlayer;

            if (canEndRedive) {
              e.rediveCount = (e.rediveCount || 0) + 1;
              e.diveT = 0;

              const vx = e.coastVX || (dir * 8);
              const vy = e.coastVY || 2;
              const vlen = Math.hypot(vx, vy) || 1;
              const ux = vx / vlen;
              const uy = vy / vlen;
              const side2 = player.x < e.x ? -1 : 1;

              // 現在の流れを次の曲線の入口にする。
              e.diveDir = side2;
              e.diveStartX = e.x;
              e.diveStartY = e.y;
              e.diveControlX = e.x + ux * 150 + side2 * 55;
              e.diveControlY = e.y + uy * 150 - 35;

              // 再攻撃も基本は前を横切る。体当たりではない。
              e.diveAimX = player.x + side2 * (62 + Math.random() * 42);
              e.diveAimY = player.y - 52 - Math.random() * 28;
              e.diveTargetX = side2 > 0 ? W + 160 : -160;
              e.diveTargetY = player.y + 8;
              e.fireTimes = [56, 92, 128];
              e.firedShots = 0;

            } else {
              // スクランブルモード：
              // 残存機が少なくなると、もう隊列を維持せず個別戦闘へ移行する。
              if (isScrambleMode(e)) {

                // 一部は逃走。
                if (Math.random() < SCRAMBLE.escapeChance) {
                  e.state = 'gone';

                } else {
                  // 上方から直接再出撃。
                  e.state = 'active';
                  e.diveDelay = 18 + Math.random() * 58;
                  e.rediveMax = SCRAMBLE.rediveMax;

                  const topWorldY = player.y + (0 - player.y) / Math.max(cameraScale, 0.1);
                  e.x = Math.random() * W;
                  e.y = topWorldY - 120 - Math.random() * 120;
                }

              } else {

                beginAlienReturn(e, dir);
              }
            }
          }

          }
        } else if (e.state === 'offscreen') {
          e.offscreenT++;
          // 画面外に出たまま待たせる。後で帰還ルーチンをここに接続する。
          if (e.offscreenT > 240) {
            e.y = -24;
            e.x = e.homeX;
            e.state = 'active';
            e.diveDelay = 280 + Math.random() * 360;
          }
        } else if (e.state === 'return') {
          // 帰還中でも、残存機が少なくなったらスクランブルへ切り替える。
          // ただし、自機より上の航路編隊に属する敵は画面上を飛んで隊列へ戻す。
          if (isScrambleMode(e) && e.returnMode !== 'visibleUpper') {
            if (Math.random() < SCRAMBLE.escapeChance) {
              e.state = 'gone';
              return;
            } else {
              const topWorldY = player.y + (0 - player.y) / Math.max(cameraScale, 0.1);
              e.state = 'active';
              e.diveDelay = 18 + Math.random() * 52;
              e.rediveMax = SCRAMBLE.rediveMax;
              e.x = Math.random() * W;
              e.y = topWorldY - 120 - Math.random() * 120;
              return;
            }
          }

          e.returnT++;

          const duration = e.returnDuration || RETURN_TUNING.quietReturnFrames;
          const t = Math.min(1, e.returnT / duration);
          const ease = t * t * (3 - 2 * t);
          const targetX = e.homeX + Math.sin(time * 0.025) * 28;
          const targetY = e.homeY + 15;

          if (e.returnMode === 'visibleUpper') {
            const q = 1 - ease;
            const controlX = (e.returnFromX + targetX) * 0.5 + (e.returnSide || 1) * 42;
            const controlY = Math.min(e.returnFromY, targetY) - 90;
            e.x = q * q * e.returnFromX + 2 * q * ease * controlX + ease * ease * targetX;
            e.y = q * q * e.returnFromY + 2 * q * ease * controlY + ease * ease * targetY;
          } else {
            e.x = e.returnFromX + (targetX - e.returnFromX) * ease;
            e.y = e.returnFromY + (targetY - e.returnFromY) * ease;
          }

          if (t >= 1) {
            e.state = 'active';
            e.returnMode = null;
            e.sortieGroupStarted = false;
            e.diveDelay = e.role === 'commander' ? 320 + Math.random() * 300 : 280 + Math.random() * 360;
          }
        }
      });

      cleanupDistantNonFocusAliens();

      // bullet collisions
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.state === 'return' || e.state === 'offscreen' || e.state === 'gone') continue;

        // メテオは警告中は無敵。飛び出してから撃破可能。
        if (e.type === 'angry' && e.state === 'dive' && e.meteorInit && !e.meteorLaunched) continue;

        let hit = false;
        let hitByExplosion = false;

        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (Math.hypot(b.x - e.x, b.y - e.y) < e.r + b.r) {
            bullets.splice(j, 1);
            hit = true;

            // ブラスターも眠り編隊を起こす。
            // 1発で倒れない相手は即起床し、周囲もざわつく。
            if (e.state === 'sleep') {
              wakeDormantEnemy(e, 'blaster');
              wakeDormantEnemiesNear(e.x, e.y, WAKEUP_WEAPONS.blasterRadius, 'blaster');
            }

            // ブラスター命中時は、次弾をすぐ撃てるようにする。
            // 護衛をビシバシ剥がすための命中リズム補正。
            player.shotCooldown = Math.min(player.shotCooldown, 3);

            break;
          }
        }

        for (const ex of explosions) {
          if (Math.hypot(ex.x - e.x, ex.y - e.y) < ex.r + e.r) {
            hit = true;
            hitByExplosion = true;
          }
        }

        // 護衛がいる間、編隊長は爆風では倒れない。
        // ブラスターなら通るので、護衛を剥がす以外の選択肢も残る。
        if (hitByExplosion && e.role === 'commander' && commanderHasGuard(e)) {
          hit = false;
          // シールド反応の小さな粒子だけ出す。
          for (let k = 0; k < 3; k++) {
            particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*2.2, vy: (Math.random()-0.5)*2.2, life: 14, r: 1.5 });
          }
        }

        if (hit) {
          e.hp = (e.hp || 1) - 1;
        }

        if (hit && e.hp <= 0) {
          score += e.role === 'commander' ? 50 : (e.role === 'guard' ? 20 : 10);
          for (let k = 0; k < 6; k++) particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 24, r: 2 });
          // nearby enemies wake up or react.
          // 飛行中の敵まで active に戻すと、突撃軌道が壊れて隊列へ直帰するため、
          // sleep / active の敵だけに波及させる。
          enemies.forEach(o => {
            const d = Math.hypot(o.x - e.x, o.y - e.y);
            if (d < 85) {
              if (o.state === 'sleep') {
                o.state = 'active';
                o.alert = 1;
              } else if (o.state === 'active') {
                o.alert = 1;
                // active中の赤だけ、ときどきメテオ突入。
                // すでにdive中の敵には触らない。
                if (o.type === 'angry' && Math.random() < 0.45) {
                  o.state = 'dive';
                  o.diveT = 0;
                  o.meteorInit = false;
                  o.meteorLaunched = false;
                }
              }
            }
          });
          enemies.splice(i, 1);
        }
      }

      explosions.forEach(ex => { ex.r += (ex.maxR - ex.r) * 0.18; ex.life--; });
      particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.life--; });
      meteorWarnings.forEach(w => { w.life--; });
      for (let i = meteorWarnings.length - 1; i >= 0; i--) {
        if (meteorWarnings[i].life <= 0) meteorWarnings.splice(i, 1);
      }
      for (let i = explosions.length - 1; i >= 0; i--) if (explosions[i].life <= 0) explosions.splice(i, 1);
      for (let i = particles.length - 1; i >= 0; i--) if (particles[i].life <= 0) particles.splice(i, 1);

      for (let i = enemies.length - 1; i >= 0; i--) {
        if (enemies[i].state === 'gone') enemies.splice(i, 1);
      }

      updateClassicEncounterLifecycle();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // camera centered on battle area
      ctx.save();
      const cx = player.x;
      const cy = player.y;
      ctx.translate(cx, cy);
      ctx.scale(cameraScale, cameraScale);
      ctx.translate(-cx, -cy);

      drawStars();
      drawSpaceMesh();
      drawSquadronBlips();

      // alert radius faint
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.beginPath();
      ctx.arc(player.x, player.y, 100, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffff';
      ctx.stroke();
      ctx.restore();

      // enemies
      const enemyVisualScaleNow = cameraEnemyDrawScale();
      enemies.forEach(e => {
        ctx.save();
        const awake = e.state !== 'sleep';
        ctx.globalAlpha = awake ? 1 : 0.55;
        ctx.translate(e.x, e.y);
        ctx.scale(enemyVisualScaleNow, enemyVisualScaleNow);
        ctx.beginPath();
        ctx.arc(0, 0, e.r, 0, Math.PI * 2);
        ctx.fillStyle = awake
          ? (e.type === 'angry' ? '#ff3864'
             : e.type === 'commander' ? '#facc15'
             : e.type === 'guard' ? '#fb923c'
             : (e.type === 'purple' ? '#a855f7' : '#ff6b6b'))
          : (e.type === 'commander' ? '#a16207'
             : e.type === 'guard' ? '#9a3412'
             : e.type === 'purple' ? '#6d28d9' : '#64748b');
        ctx.fill();

        if (e.wakeFlash && e.wakeFlash > 0) {
          const p = e.wakeFlash / 34;
          ctx.strokeStyle = `rgba(250,204,21,${0.22 + p * 0.42})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, e.r + 7 + (1 - p) * 8, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (e.bumpLife && e.bumpLife > 0) {
          const p = e.bumpLife / 20;
          ctx.strokeStyle = `rgba(125,211,252,${0.18 + p * 0.36})`;
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.arc(0, 0, e.r + 10 + Math.sin(time * 0.5) * 2, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (e.evadeFlash && e.evadeFlash > 0) {
          const p = e.evadeFlash / 28;
          ctx.strokeStyle = `rgba(125,211,252,${0.25 + p * 0.45})`;
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.moveTo(-e.r - 12, e.r + 6);
          ctx.lineTo(e.r + 12, -e.r - 6);
          ctx.stroke();
        }

        if (e.type === 'purple') {
          ctx.strokeStyle = awake ? 'rgba(216,180,254,0.90)' : 'rgba(167,139,250,0.55)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(-e.r - 3, 0);
          ctx.lineTo(-e.r - 10, -3);
          ctx.moveTo(e.r + 3, 0);
          ctx.lineTo(e.r + 10, -3);
          ctx.stroke();
        }

        if (e.type === 'commander') {
          // 編隊長マーク。
          // 円形リングは後光っぽく見えるのでやめ、左右の肩章・階級章風にする。
          const guarded = commanderHasGuard(e);
          ctx.strokeStyle = guarded ? 'rgba(251,191,36,0.90)' : 'rgba(251,191,36,0.45)';
          ctx.lineWidth = 1.8;

          // 左右の短い肩章ライン
          ctx.beginPath();
          ctx.moveTo(-e.r - 10, -4);
          ctx.lineTo(-e.r - 3, -1);
          ctx.lineTo(-e.r - 10, 3);
          ctx.moveTo(e.r + 10, -4);
          ctx.lineTo(e.r + 3, -1);
          ctx.lineTo(e.r + 10, 3);
          ctx.stroke();

          // 上部の小さな階級章
          ctx.fillStyle = guarded ? 'rgba(251,191,36,0.85)' : 'rgba(251,191,36,0.45)';
          ctx.beginPath();
          ctx.moveTo(0, -e.r - 8);
          ctx.lineTo(-4, -e.r - 2);
          ctx.lineTo(4, -e.r - 2);
          ctx.closePath();
          ctx.fill();

          // 護衛ありのときは、シールドではなく短い水平ラインで「守られている」感を出す。
          if (guarded) {
            ctx.strokeStyle = 'rgba(253,224,71,0.35)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(-e.r - 13, e.r + 3);
            ctx.lineTo(e.r + 13, e.r + 3);
            ctx.stroke();
          }
        }

        if (e.type === 'guard') {
          ctx.strokeStyle = 'rgba(251,146,60,0.85)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(-e.r - 4, 4);
          ctx.lineTo(e.r + 4, 4);
          ctx.stroke();
        }

        if (e.warpInLife && e.warpInLife > 0) {
          ctx.strokeStyle = 'rgba(147,197,253,0.75)';
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.arc(0, 0, e.r + 10 + Math.sin(time * 0.35) * 3, 0, Math.PI * 2);
          ctx.stroke();
          e.warpInLife--;
        }

        if (!awake) {
          ctx.strokeStyle = 'rgba(255,255,255,0.35)';
          ctx.beginPath();
          ctx.moveTo(-4, -2); ctx.lineTo(4, -2);
          ctx.stroke();
        } else {
          ctx.fillStyle = '#fff';
          ctx.fillRect(-3, -2, 2, 2);
          ctx.fillRect(2, -2, 2, 2);
        }
        ctx.restore();
      });

      // impact-course target warnings
      enemies.forEach(e => {
        if (!e.impactWarned || e.impactWarningLife <= 0) return;
        ctx.save();
        const pulse = 0.55 + Math.sin(time * 0.35) * 0.22;
        ctx.globalAlpha = pulse;
        ctx.strokeStyle = '#7CFF7C';
        ctx.lineWidth = 2;
        ctx.translate(e.x, e.y);
        ctx.rotate(Math.PI / 4);
        const size = (e.r * enemyVisualScaleNow) + 10;
        ctx.strokeRect(-size, -size, size * 2, size * 2);
        ctx.rotate(-Math.PI / 4);
        ctx.fillStyle = '#7CFF7C';
        ctx.font = '10px monospace';
        ctx.fillText('IMPACT', size + 6, -size - 2);
        ctx.restore();
      });

      // enemy bullets
      enemyBullets.forEach(b => {
        if (b.kind === 'needle') {
          // 針弾：細く、下方向に伸びる伝統的な弾。
          ctx.save();
          ctx.strokeStyle = '#ffd1d1';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(b.x, b.y - 7);
          ctx.lineTo(b.x, b.y + 7);
          ctx.stroke();
          ctx.restore();
        } else {
          // 狙撃弾：従来の丸い弾。
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fillStyle = '#ffb4b4';
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,80,80,0.6)';
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r + 3, 0, Math.PI * 2);
          ctx.stroke();
        }
      });

      // bombs
      bombs.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r + Math.sin(time * 0.4) * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = b.hold > 0 ? '#fde68a' : '#facc15';
        ctx.fill();
        ctx.strokeStyle = b.hold > 0 ? 'rgba(253,230,138,0.70)' : 'rgba(250,204,21,0.45)';
        ctx.beginPath();
        // 任意起爆可能な範囲を示す、控えめなパルス。
        const pulseBase = b.hold > 0 ? 24 : 18;
        ctx.arc(b.x, b.y, pulseBase + Math.sin(time * 0.12) * 4, 0, Math.PI * 2);
        ctx.stroke();
      });

      // bullets
      bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = '#9ae6ff';
        ctx.fill();
      });

      // explosions
      explosions.forEach(ex => {
        ctx.save();
        ctx.globalAlpha = Math.max(0, ex.life / 30);
        ctx.beginPath();
        ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI * 2);
        ctx.strokeStyle = '#facc15';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(ex.x, ex.y, ex.r * 0.58, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
      });

      // particles
      particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life / 30);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.restore();
      });


      // meteor warnings
      meteorWarnings.forEach(w => {
        ctx.save();
        ctx.globalAlpha = 0.35 + Math.sin(time * 0.25) * 0.18;
        ctx.strokeStyle = '#7CFF7C';
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(w.x1, w.y1);
        ctx.lineTo(w.x2, w.y2);
        ctx.stroke();

        ctx.setLineDash([]);
        ctx.fillStyle = '#7CFF7C';
        ctx.font = '12px monospace';
        ctx.fillText('METEOR WARNING', w.x1 + 12, w.y1 - 10);
        ctx.restore();
      });

      drawMoveInputUI();
      drawFormationArrow();
      drawMotionGauges();

      // player triangle
      ctx.save();
      if (player.bumpInvul > 0 && Math.floor(time / 3) % 2 === 0) {
        ctx.globalAlpha = 0.58;
      }
      ctx.translate(player.x, player.y);
      ctx.rotate(Math.atan2(player.vy, player.vx) * 0.08);
      ctx.beginPath();
      ctx.moveTo(0, -15);
      ctx.lineTo(11, 12);
      ctx.lineTo(0, 6);
      ctx.lineTo(-11, 12);
      ctx.closePath();
      ctx.fillStyle = player.boosting ? '#ffffff' : '#dbeafe';
      ctx.fill();
      ctx.strokeStyle = 'rgba(147,197,253,0.8)';
      ctx.stroke();
      if (player.boosting) {
        ctx.beginPath();
        ctx.moveTo(-6, 13); ctx.lineTo(0, 28 + Math.random()*10); ctx.lineTo(6, 13);
        ctx.fillStyle = 'rgba(96,165,250,0.7)';
        ctx.fill();
      }
      if (player.bumpFlash > 0) {
        const p = player.bumpFlash / DORMANT_BUMP.invul;
        ctx.strokeStyle = `rgba(191,219,254,${0.28 + p * 0.42})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, 21 + (1 - p) * 10, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();

      ctx.restore();

      drawNavigationRulers();
      drawPanel();
    }

    function drawStars() {
      ctx.save();

      // 星は「数」よりも奥行き差で宇宙感を出す。
      // 180個程度ならCanvasでもかなり軽い。
      for (let i = 0; i < 180; i++) {
        const layer = 0.08 + (i % 7) * 0.055;
        const speedTwinkle = 0.08 + (i % 5) * 0.018;
        const x = ((i * 97 + time * speedTwinkle + starOffsetX * layer) % W + W) % W;
        const y = ((i * 53 + time * (speedTwinkle + 0.04) + starOffsetY * (layer * 0.92)) % battleH + battleH) % battleH;
        const size = 0.8 + (i % 3) * 0.45 + (layer > 0.32 ? 0.35 : 0);
        ctx.globalAlpha = 0.08 + layer * 0.72;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x, y, size, size);
      }
      ctx.restore();
    }

    function drawSpaceMesh() {
      ctx.save();

      // 実座標に同期した航法メッシュ。
      // starOffsetX/Y は shiftWorld() で実際の世界移動量だけ更新される。
      // この関数はカメラズームの内側で描かれるので、ズームインで粗く、ズームアウトで密になる。
      const grid = NAV_GRID;
      const major = NAV_GRID * NAV_MAJOR_EVERY;
      const margin = Math.max(W, battleH) * 1.2;
      const left = -margin;
      const right = W + margin;
      const top = -margin;
      const bottom = battleH + margin;

      const firstX = Math.floor((left - starOffsetX) / grid) * grid + starOffsetX;
      const firstY = Math.floor((top - starOffsetY) / grid) * grid + starOffsetY;

      ctx.lineWidth = 1;
      ctx.font = '10px system-ui';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';

      for (let x = firstX; x <= right; x += grid) {
        const worldLine = Math.round((x - starOffsetX) / grid);
        const isMajor = Math.abs(worldLine) % NAV_MAJOR_EVERY === 0;
        ctx.strokeStyle = isMajor ? 'rgba(125, 211, 252, 0.125)' : 'rgba(125, 211, 252, 0.050)';
        ctx.beginPath();
        ctx.moveTo(x, top);
        ctx.lineTo(x, bottom);
        ctx.stroke();
      }

      for (let y = firstY; y <= bottom; y += grid) {
        const worldLine = Math.round((y - starOffsetY) / grid);
        const isMajor = Math.abs(worldLine) % NAV_MAJOR_EVERY === 0;
        ctx.strokeStyle = isMajor ? 'rgba(125, 211, 252, 0.125)' : 'rgba(125, 211, 252, 0.050)';
        ctx.beginPath();
        ctx.moveTo(left, y);
        ctx.lineTo(right, y);
        ctx.stroke();
      }

      // 斜め線は装飾ではなく、方位感を出すためにかなり薄く入れる。
      const diag = major;
      const firstDiag = Math.floor((left - starOffsetX) / diag) * diag + starOffsetX;
      ctx.strokeStyle = 'rgba(125, 211, 252, 0.030)';
      for (let x = firstDiag - battleH; x < right + battleH; x += diag) {
        ctx.beginPath();
        ctx.moveTo(x, top);
        ctx.lineTo(x + battleH * 0.55, bottom);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawNavigationRulers() {
      ctx.save();

      // 画面端の固定目盛り。こちらはUIなのでズーム変換の外で描く。
      // メッシュと同じワールド間隔を、現在ズーム後の画面ピクセル間隔に換算する。
      const gridPx = NAV_GRID * cameraScale;
      const majorPx = NAV_GRID * NAV_MAJOR_EVERY * cameraScale;
      const safeGridPx = Math.max(28, gridPx);
      const ox = ((starOffsetX * cameraScale) % safeGridPx + safeGridPx) % safeGridPx;
      const oy = ((starOffsetY * cameraScale) % safeGridPx + safeGridPx) % safeGridPx;

      ctx.strokeStyle = 'rgba(226, 232, 240, 0.28)';
      ctx.fillStyle = 'rgba(226, 232, 240, 0.58)';
      ctx.lineWidth = 1;
      ctx.font = '10px system-ui';
      ctx.textBaseline = 'middle';

      // 左右の縦目盛り
      for (let y = -oy; y <= battleH; y += safeGridPx) {
        const approxWorld = Math.round((y - starOffsetY * cameraScale) / (NAV_GRID * cameraScale));
        const isMajor = Math.abs(approxWorld) % NAV_MAJOR_EVERY === 0;
        const tick = isMajor ? 14 : 7;
        ctx.globalAlpha = isMajor ? 0.78 : 0.42;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(tick, y);
        ctx.moveTo(W, y);
        ctx.lineTo(W - tick, y);
        ctx.stroke();
      }

      // 上端の横目盛り。戦闘エリア内だけ。
      for (let x = -ox; x <= W; x += safeGridPx) {
        const approxWorld = Math.round((x - starOffsetX * cameraScale) / (NAV_GRID * cameraScale));
        const isMajor = Math.abs(approxWorld) % NAV_MAJOR_EVERY === 0;
        const tick = isMajor ? 14 : 7;
        ctx.globalAlpha = isMajor ? 0.78 : 0.42;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, tick);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(226, 232, 240, 0.65)';
      ctx.restore();
    }

    function drawMoveInputUI() {
      const cx = playerBaseX();
      const cy = playerBaseY();
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.14)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, MOVE.inputRadius, 0, Math.PI * 2);
      ctx.stroke();

      if (moveInput.active || moveInput.mode === 'dragworld') {
        if (moveInput.mode === 'vector' && moveInput.power > 0) {
          const ix = cx + moveInput.dx * MOVE.inputRadius * moveInput.power;
          const iy = cy + moveInput.dy * MOVE.inputRadius * moveInput.power;
          ctx.strokeStyle = 'rgba(250,204,21,0.92)';
          ctx.lineWidth = 3;
          ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ix, iy); ctx.stroke();
        } else if (moveInput.mode === 'tap') {
          ctx.strokeStyle = 'rgba(96,165,250,0.9)';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(moveInput.targetX, moveInput.targetY, 16, 0, Math.PI * 2); ctx.stroke();
        } else if (moveInput.mode === 'dragworld') {
          const len = Math.min(56, Math.hypot(moveInput.dx, moveInput.dy));
          if (len > 1) {
            const a = Math.atan2(moveInput.dy, moveInput.dx);
            ctx.strokeStyle = 'rgba(250,204,21,0.85)';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(a) * len, cy + Math.sin(a) * len); ctx.stroke();
          }
        }
      }
      if (gamepadState.active && gamepadState.power > 0) {
        const len = 48 * gamepadState.power;
        const a = Math.atan2(gamepadState.dy, gamepadState.dx);
        ctx.strokeStyle = 'rgba(125,211,252,0.85)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * len, cy + Math.sin(a) * len);
        ctx.stroke();
      }

      if (keyboardStick.active && keyboardStick.power > 0) {
        const len = 48 * keyboardStick.power;
        const a = Math.atan2(keyboardStick.dy, keyboardStick.dx);
        ctx.strokeStyle = 'rgba(125,211,252,0.85)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * len, cy + Math.sin(a) * len);
        ctx.stroke();
      }

      const next = nearestInactiveSquadron();
      if (next && next.distance < 3200) {
        const s = next.squadron;
        const dx = s.x - player.x;
        const dy = s.y - player.y;
        const a = Math.atan2(dy, dx);
        const labelX = W / 2 + Math.cos(a) * Math.min(W * 0.32, 150);
        const labelY = 48 + Math.max(0, Math.sin(a)) * 20;

        ctx.globalAlpha = 0.55;
        ctx.fillStyle = 'rgba(125,211,252,0.88)';
        ctx.font = '11px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('NEXT ENCOUNTER ' + Math.round(next.distance), labelX, labelY);
      }

      ctx.restore();
    }

    function drawFormationArrow() {
      // 索敵UI。
      // ワールド内の物体ではなく、画面上のUIなのでズーム率に左右されない。
      // ズームアウトしているときほど、むしろ大きく・見やすく表示する。
      if (cameraScale > 0.96) return;

      const info = formationOffscreenInfo();
      if (!info) return; // 編隊が見えたら即消える

      // 3.5秒周期で短くピコピコ。ただし低ズーム時は少し長めに表示。
      const cycle = time % 210;
      const visibleFrames = cameraScale < 0.45 ? 78 : 52;
      if (cycle > visibleFrames) return;

      const a = Math.atan2(info.dy, info.dx);

      // 画面端に固定する。ズーム空間ではなくHUD空間。
      const edgeMargin = cameraScale < 0.45 ? 38 : 26;
      const cx = W / 2;
      const cy = battleH / 2;

      let px = cx + Math.cos(a) * W;
      let py = cy + Math.sin(a) * battleH;

      px = Math.max(edgeMargin, Math.min(W - edgeMargin, px));
      py = Math.max(edgeMargin, Math.min(battleH - edgeMargin, py));

      const pulse = 0.5 + 0.5 * Math.sin(time * 0.55);

      // 低ズーム時ほど大きくする。
      // 0.30付近では約2倍、0.70付近では少しだけ大きく。
      const uiScale = cameraScale < 0.45 ? 2.15 : (cameraScale < 0.75 ? 1.55 : 1.15);

      ctx.save();
      ctx.translate(px, py);
      ctx.scale(uiScale, uiScale);

      ctx.fillStyle = 'rgba(125,211,252,' + (0.34 + pulse * 0.44).toFixed(2) + ')';
      ctx.strokeStyle = 'rgba(125,211,252,' + (0.24 + pulse * 0.34).toFixed(2) + ')';
      ctx.lineWidth = 1.4;

      // 中心ピコ
      ctx.beginPath();
      ctx.arc(0, 0, 4.0 + pulse * 1.8, 0, Math.PI * 2);
      ctx.fill();

      // 方向側に点列。避ける対象ではなく索敵反応に見せる。
      ctx.rotate(a);
      for (let i = 1; i <= 4; i++) {
        const alpha = Math.max(0.12, 0.58 - i * 0.10 + pulse * 0.24);
        ctx.fillStyle = 'rgba(125,211,252,' + alpha.toFixed(2) + ')';
        ctx.beginPath();
        ctx.arc(i * 8, 0, 2.4 - i * 0.20, 0, Math.PI * 2);
        ctx.fill();
      }

      // 電波っぽい波紋
      ctx.rotate(-a);
      ctx.globalAlpha = 0.18 + pulse * 0.22;
      ctx.beginPath();
      ctx.arc(0, 0, 10 + pulse * 9, 0, Math.PI * 2);
      ctx.stroke();

      // 低ズーム時だけ、さらに外側の波紋を追加して「こっちだよ」感を出す。
      if (cameraScale < 0.45) {
        ctx.globalAlpha = 0.10 + pulse * 0.16;
        ctx.beginPath();
        ctx.arc(0, 0, 22 + pulse * 10, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawMotionGauges() {
      // 航法目盛り風の縦ゲージ。
      // G計のように機敏に動かすのではなく、宇宙船の移動に合わせて
      // 目盛りがゆっくり流れる「航法計器」として見せる。
      // 横ゲージは軽く見えすぎるため撤去。
      ctx.save();

      const speed = Math.hypot(player.vx, player.vy);
      const flow = (starOffsetY * 0.035 + time * 0.18) % 22;
      const sideFlow = (starOffsetX * 0.030) % 22;

      const top = isTouchLayout() ? 34 : 58;
      const bottom = isTouchLayout() ? battleH - 22 : H - 42;
      const h = Math.max(120, bottom - top);

      const alpha = isTouchLayout() ? 0.42 : 0.46;
      const lineColor = 'rgba(125,211,252,' + alpha.toFixed(2) + ')';
      const faintColor = 'rgba(125,211,252,' + (alpha * 0.42).toFixed(2) + ')';

      const leftX = isTouchLayout() ? 16 : 24;
      const rightX = isTouchLayout() ? W - 16 : W - 24;

      function navStrip(x, sideSign) {
        ctx.save();
        ctx.globalAlpha = 1;

        // 基準ライン
        ctx.strokeStyle = faintColor;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, top);
        ctx.lineTo(x, bottom);
        ctx.stroke();

        // 流れる目盛り。縦移動と横移動の両方をほんの少し反映。
        for (let y = top - 24 + flow; y < bottom + 24; y += 22) {
          const normalized = (y - top) / h;
          const centerFade = 1 - Math.abs(normalized - 0.5) * 0.75;
          const a = Math.max(0.10, Math.min(alpha, alpha * centerFade));

          const longTick = Math.round((y + sideFlow) / 66) % 3 === 0;
          const len = longTick ? 15 : 8;

          ctx.strokeStyle = 'rgba(125,211,252,' + a.toFixed(2) + ')';
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + sideSign * len, y);
          ctx.stroke();
        }

        // 中央の基準マーカー。機体の現在姿勢の支点のように見せる。
        const cy = top + h * 0.5;
        ctx.strokeStyle = lineColor;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x, cy);
        ctx.lineTo(x + sideSign * 20, cy);
        ctx.stroke();

        // 速度があるときだけ、かすかな光点が流れる。
        if (speed > 0.4) {
          const beadY = top + ((time * (0.55 + speed * 0.08) + starOffsetY * 0.04) % h);
          ctx.fillStyle = 'rgba(125,211,252,0.38)';
          ctx.beginPath();
          ctx.arc(x + sideSign * 13, beadY, 2.2, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      navStrip(leftX, 1);
      navStrip(rightX, -1);

      ctx.restore();
    }

    function drawPanel() {
      ctx.save();

      if (!isTouchLayout()) {
        // PC版：下部パネルなし。最低限のHUDだけ薄く表示。
        // PC版HUD：シネマティックHUD
        ctx.font = '12px system-ui';
        ctx.textBaseline = 'top';

        // --- 左上 ---
        ctx.textAlign = 'left';

        ctx.fillStyle = 'rgba(165,243,252,0.92)';
        ctx.fillText('SCORE', 18, 14);

        ctx.fillStyle = 'rgba(226,232,240,0.92)';
        ctx.fillText(String(score), 82, 14);

        ctx.fillStyle = 'rgba(165,243,252,0.72)';
        ctx.fillText('|', 132, 14);

        ctx.fillStyle = 'rgba(165,243,252,0.92)';
        ctx.fillText('ZOOM', 156, 14);

        ctx.fillStyle = 'rgba(226,232,240,0.92)';
        ctx.fillText(cameraScale.toFixed(2), 218, 14);

        ctx.fillStyle = 'rgba(165,243,252,0.72)';
        ctx.fillText('|', 286, 14);

        ctx.fillStyle = 'rgba(165,243,252,0.92)';
        ctx.fillText('ENEMY', 312, 14);

        ctx.fillStyle = 'rgba(226,232,240,0.92)';
        ctx.fillText(String(enemies.length), 388, 14);

        // --- 右上 ---
        ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(226,232,240,0.72)';
        ctx.fillText('PC : Xbox/HORI/カーソルキー対応', W - 18, 14);

        // --- スクランブル表示 ---
        if (anyScrambleMode()) {
          ctx.textAlign = 'left';
          ctx.fillStyle = 'rgba(252,165,165,0.96)';
          ctx.fillText('SCRAMBLE ACE MODE.', 18, 40);
        }

        // --- 左下 POSITION ---
        const panelY = H - 86;

        ctx.strokeStyle = 'rgba(103,232,249,0.28)';
        ctx.lineWidth = 1;

        ctx.beginPath();
        ctx.moveTo(18, panelY);
        ctx.lineTo(148, panelY);
        ctx.lineTo(166, panelY + 16);
        ctx.lineTo(166, panelY + 72);
        ctx.lineTo(18, panelY + 72);
        ctx.closePath();
        ctx.stroke();

        ctx.textAlign = 'left';
        ctx.fillStyle = 'rgba(103,232,249,0.92)';
        ctx.fillText('POSITION', 30, panelY + 12);

        ctx.fillStyle = 'rgba(226,232,240,0.82)';
        ctx.fillText('X: ' + player.x.toFixed(2), 30, panelY + 38);
        ctx.fillText('Y: ' + player.y.toFixed(2), 30, panelY + 56);

        // --- 右下 STATUS ---
        const rx = W - 166;

        ctx.beginPath();
        ctx.moveTo(rx, panelY + 16);
        ctx.lineTo(rx + 18, panelY);
        ctx.lineTo(rx + 148, panelY);
        ctx.lineTo(rx + 148, panelY + 72);
        ctx.lineTo(rx, panelY + 72);
        ctx.closePath();
        ctx.stroke();

        const speed = Math.hypot(player.vx, player.vy);

        ctx.fillStyle = 'rgba(103,232,249,0.92)';
        ctx.fillText('SPEED', rx + 18, panelY + 12);

        ctx.fillStyle = 'rgba(226,232,240,0.82)';
        ctx.fillText(speed.toFixed(1), rx + 18, panelY + 38);

        ctx.restore();
        return;
      }

      ctx.fillStyle = 'rgba(5, 8, 16, 0.96)';
      ctx.fillRect(0, battleH, W, panelH);
      ctx.strokeStyle = 'rgba(148,163,184,0.35)';
      ctx.beginPath();
      ctx.moveTo(0, battleH + 0.5);
      ctx.lineTo(W, battleH + 0.5);
      ctx.stroke();

      // スマホ版HUDは整理してシンプルに。
      ctx.fillStyle = 'rgba(255,255,255,0.72)';
      ctx.font = '11px system-ui';

      ctx.textAlign = 'left';
      ctx.fillText('SCORE ' + score, 12, battleH + 24);

      ctx.textAlign = 'center';
      ctx.fillText('ZOOM ' + cameraScale.toFixed(2), W / 2, battleH + 24);

      ctx.textAlign = 'right';
      ctx.fillText('ENEMY ' + enemies.length, W - 12, battleH + 24);

      ctx.fillStyle = 'rgba(255,255,255,0.48)';
      ctx.textAlign = 'center';
      ctx.fillText('STABILIZER ' + (computeCombatDanger() > 0.02 ? 'ACTIVE' : 'STANDBY'), W / 2, battleH + 44);

      if (anyScrambleMode()) {
        ctx.fillStyle = '#fca5a5';
        ctx.textAlign = 'right';
        ctx.fillText('SCRAMBLE', W - 12, battleH + 44);
      }

      if (isTouchLayout()) {
        const c = mobileStickCenter();
        const r = mobileStick.radius;

        ctx.save();
        ctx.globalAlpha = 0.92;
        ctx.strokeStyle = 'rgba(125,211,252,0.42)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(125,211,252,0.22)';
        ctx.beginPath();
        ctx.arc(c.x, c.y, r * 0.42, 0, Math.PI * 2);
        ctx.stroke();

        const kx = mobileStick.active ? c.x + mobileStick.dx * r * mobileStick.power : c.x;
        const ky = mobileStick.active ? c.y + mobileStick.dy * r * mobileStick.power : c.y;
        ctx.fillStyle = mobileStick.active ? 'rgba(125,211,252,0.42)' : 'rgba(125,211,252,0.18)';
        ctx.beginPath();
        ctx.arc(kx, ky, 22, 0, Math.PI * 2);
        ctx.fill();

        if (mobileStick.active && mobileStick.power > 0) {
          ctx.strokeStyle = 'rgba(125,211,252,0.85)';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(c.x, c.y);
          ctx.lineTo(kx, ky);
          ctx.stroke();
        }

        ctx.fillStyle = 'rgba(226,232,240,0.55)';
        ctx.font = '11px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('MOVE', c.x, c.y + r + 18);
        ctx.restore();
      }

      buttons.forEach((b, i) => {
        const cooldown = b.label === 'SHOT' ? player.shotCooldown / 18 : b.label === 'BOMB' ? player.bombCooldown / 95 : player.boostCooldown / 120;
        ctx.save();
        ctx.beginPath();
        roundRect(ctx, b.x, b.y, b.w, b.h, b.small ? 10 : 16);
        ctx.fillStyle = b.down ? 'rgba(96,165,250,0.45)' : 'rgba(15,23,42,0.95)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(148,163,184,0.65)';
        ctx.stroke();

        if (cooldown > 0) {
          ctx.beginPath();
          roundRect(ctx, b.x, b.y + b.h * (1 - cooldown), b.w, b.h * cooldown, 16);
          ctx.fillStyle = 'rgba(255,255,255,0.16)';
          ctx.fill();
        }

        ctx.fillStyle = '#e5e7eb';
        ctx.font = b.small ? 'bold 11px system-ui' : 'bold 14px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2);
        ctx.restore();
      });
      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
    }

    // 固定タイムステップ。
    // 画面更新の速さや省電力状態に左右されず、ゲーム内時間を60fps基準で進める。
    const FIXED_STEP = 1000 / 60;
    let lastFrameTime = 0;
    let accumulator = 0;

    function loop(timestamp) {
      if (!lastFrameTime) lastFrameTime = timestamp;
      let frameTime = timestamp - lastFrameTime;
      lastFrameTime = timestamp;

      // タブ復帰時などに一気に進みすぎないよう上限を設ける。
      frameTime = Math.min(frameTime, 100);
      accumulator += frameTime;

      while (accumulator >= FIXED_STEP) {
        update();
        accumulator -= FIXED_STEP;
      }

      draw();
      requestAnimationFrame(loop);
    }

    init();
  </script>
</body>
</html>
