<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#05070d" />
  <title>Formation Shooter Prototype 115 Dramatic Camera</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070d;
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at 50% 25%, #111827 0%, #05070d 55%, #02030a 100%);
    }

    #hint {
      display: none;
    }

    #fullscreenTopButton {
      position: fixed;
      right: 86px;
      top: 10px;
      z-index: 20;
      border: 1px solid rgba(125,211,252,0.55);
      background: rgba(15,23,42,0.72);
      color: #dff7ff;
      border-radius: 10px;
      padding: 7px 10px;
      font: 700 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.08em;
      backdrop-filter: blur(6px);
    }

    #settingsToggle {
      position: fixed;
      right: 10px;
      top: 10px;
      z-index: 20;
      border: 1px solid rgba(125,211,252,0.55);
      background: rgba(15,23,42,0.72);
      color: #dff7ff;
      border-radius: 10px;
      padding: 7px 10px;
      font: 700 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.08em;
      backdrop-filter: blur(6px);
    }

    #settingsPanel {
      position: fixed;
      right: 10px;
      top: 48px;
      width: min(340px, calc(100vw - 20px));
      max-height: calc(100vh - 70px);
      overflow: auto;
      z-index: 21;
      display: none;
      border: 1px solid rgba(125,211,252,0.42);
      border-radius: 14px;
      background: rgba(2,6,23,0.88);
      color: #e5f7ff;
      padding: 12px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #settingsPanel.open {
      display: block;
    }

    #settingsPanel h3 {
      margin: 4px 0 10px;
      font-size: 13px;
      letter-spacing: 0.08em;
      color: #a5f3fc;
    }

    #settingsPanel .group {
      margin: 10px 0 12px;
      padding-top: 8px;
      border-top: 1px solid rgba(148,163,184,0.20);
    }

    #settingsPanel label {
      display: grid;
      grid-template-columns: 1fr 58px;
      gap: 8px;
      align-items: center;
      margin: 8px 0 4px;
      color: rgba(226,232,240,0.92);
    }

    #settingsPanel input[type="range"] {
      width: 100%;
      grid-column: 1 / 3;
    }

    #settingsPanel button {
      border: 1px solid rgba(251,191,36,0.55);
      background: rgba(120,53,15,0.65);
      color: #fff7ed;
      border-radius: 10px;
      padding: 8px 10px;
      font-weight: 700;
      margin-right: 8px;
    }

    #settingsPanel .note {
      color: rgba(203,213,225,0.72);
      line-height: 1.45;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hint"></div>
  <button id="fullscreenTopButton" type="button">FULL</button>
  <button id="settingsToggle" type="button">SET</button>
  <div id="settingsPanel" aria-label="settings panel">
    <h3>UNIVERSE TUNING</h3>

    <div class="group">
      <strong>CONTROL</strong>
      <label>推力 / Accel <span data-val="accel"></span><input data-setting="accel" type="range" min="0.20" max="0.70" step="0.01"></label>
      <label>最高速 / Max speed <span data-val="maxSpeed"></span><input data-setting="maxSpeed" type="range" min="3.5" max="8.0" step="0.1"></label>
      <label>慣性 / Friction <span data-val="friction"></span><input data-setting="friction" type="range" min="0.930" max="0.990" step="0.001"></label>
      <label>スマホ感度 <span data-val="mobileAccelBoost"></span><input data-setting="mobileAccelBoost" type="range" min="0.70" max="1.60" step="0.01"></label>
      <label>スマホ最高速倍率 <span data-val="mobileMaxSpeedScale"></span><input data-setting="mobileMaxSpeedScale" type="range" min="0.70" max="1.25" step="0.01"></label>
    </div>

    <div class="group">
      <strong>CAMERA</strong>
      <label>PC最大ズーム <span data-val="maxZoomPC"></span><input data-setting="maxZoomPC" type="range" min="1.00" max="1.70" step="0.01"></label>
      <label>スマホ最大ズーム <span data-val="maxZoomMobile"></span><input data-setting="maxZoomMobile" type="range" min="0.70" max="1.30" step="0.01"></label>
      <label>ズーム追随 <span data-val="zoomFollow"></span><input data-setting="zoomFollow" type="range" min="0.005" max="0.080" step="0.001"></label>
    </div>

    <div class="group">
      <strong>BATTLE</strong>
      <label>スクランブル閾値 <span data-val="scrambleThreshold"></span><input data-setting="scrambleThreshold" type="range" min="2" max="10" step="1"></label>
      <label>紫横展開幅 <span data-val="purpleSpread"></span><input data-setting="purpleSpread" type="range" min="0.60" max="1.20" step="0.01"></label>
    </div>

    <button id="settingsDefault" type="button">DEFAULT</button>
    <button id="settingsClose" type="button">CLOSE</button>
    <div class="note">調整は即時反映。DEFAULTで初期値へ戻せます。</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const DEFAULT_SETTINGS = {
      accel: 0.42,
      maxSpeed: 6.0,
      friction: 0.966,
      mobileAccelBoost: 1.05,
      mobileMaxSpeedScale: 0.92,
      maxZoomPC: 1.55,
      maxZoomMobile: 1.15,
      zoomFollow: 0.050,
      scrambleThreshold: 5,
      purpleSpread: 0.95
    };

    const SETTINGS = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));

    function applySettingsToGame() {
      if (typeof MOVE !== 'undefined') {
        MOVE.accel = SETTINGS.accel;
        MOVE.maxSpeed = SETTINGS.maxSpeed;
        MOVE.friction = SETTINGS.friction;
      }
      if (typeof mobileStick !== 'undefined') {
        mobileStick.accelBoost = SETTINGS.mobileAccelBoost;
      }
      if (typeof SCRAMBLE !== 'undefined') {
        SCRAMBLE.threshold = SETTINGS.scrambleThreshold;
      }
    }

    function syncSettingsPanel() {
      document.querySelectorAll('[data-setting]').forEach(input => {
        const key = input.dataset.setting;
        input.value = SETTINGS[key];
      });
      document.querySelectorAll('[data-val]').forEach(span => {
        const key = span.dataset.val;
        const value = SETTINGS[key];
        span.textContent = Number.isInteger(value) ? String(value) : Number(value).toFixed(3).replace(/0+$/, '').replace(/\.$/, '');
      });
    }

    function resetSettings() {
      Object.assign(SETTINGS, JSON.parse(JSON.stringify(DEFAULT_SETTINGS)));
      applySettingsToGame();
      syncSettingsPanel();
    }

    function initSettingsPanel() {
      const toggle = document.getElementById('settingsToggle');
      const panel = document.getElementById('settingsPanel');
      const fullscreenBtn = document.getElementById('fullscreenTopButton');
      const close = document.getElementById('settingsClose');
      const def = document.getElementById('settingsDefault');

      toggle.addEventListener('click', () => {
        panel.classList.toggle('open');
      });

      fullscreenBtn.addEventListener('click', requestGameFullscreen);
      close.addEventListener('click', () => panel.classList.remove('open'));
      def.addEventListener('click', resetSettings);

      document.querySelectorAll('[data-setting]').forEach(input => {
        input.addEventListener('input', () => {
          const key = input.dataset.setting;
          const raw = Number(input.value);
          SETTINGS[key] = key === 'scrambleThreshold' ? Math.round(raw) : raw;
          applySettingsToGame();
          syncSettingsPanel();
        });
      });

      applySettingsToGame();
      syncSettingsPanel();
    }

    let W = 0, H = 0, DPR = 1;
    let battleH = 0, panelH = 0;
    const PANEL_RATIO = 0.20;
    const MOBILE_PANEL_RATIO = 0.24;

    function isTouchLayout() {
      return W < 760 || (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
    }

    function currentPanelRatio() {
      // PCでは下部SHOT/BOMB/BOOSTパネルを出さず、全体を戦闘画面にする。
      // スマホでは従来どおり下部操作エリアを残す。
      return isTouchLayout() ? MOBILE_PANEL_RATIO : 0;
    }

    function maxAutoZoom() {
      return isTouchLayout() ? SETTINGS.maxZoomMobile : SETTINGS.maxZoomPC;
    }

    function resize() {
      DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = window.innerWidth;
      H = window.innerHeight;
      const ratio = currentPanelRatio();
      battleH = H * (1 - ratio);
      panelH = H * ratio;
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      layoutButtons();
    }
    window.addEventListener('resize', resize);

    const player = {
      x: 0, y: 0,
      vx: 0, vy: 0,          // 世界移動用の速度
      displayOffsetX: 0,
      displayOffsetY: 0,
      targetX: 0, targetY: 0,
      r: 11,
      shotCooldown: 0,
      bombCooldown: 0,
      boostCooldown: 0,
      boosting: 0,
      bumpCooldown: 0,
      bumpInvul: 0,
      bumpFlash: 0
    };

    const moveInput = {
      mode: 'dragworld', // 'dragworld' / 'tap' / 'vector'
      active: false,
      pointerId: null,
      lastX: 0,
      lastY: 0,
      dx: 0,
      dy: 0,
      power: 0,
      targetX: 0,
      targetY: 0
    };

    const MOVE = {
      dragSensitivity: 0.045,
      friction: 0.966,
      activeFriction: 0.982,
      accel: 0.42,
      maxSpeed: 6.0,
      inputRadius: 92,
      deadZone: 10,
      shipLag: 0.20,
      maxShipOffset: 30
    };

    // 近接戦闘時の姿勢制御。
    // 敵弾・敵機が近いときだけ慣性を弱め、小回りを利きやすくする。
    const STABILIZER = {
      enabled: true,
      bulletRadius: 86,
      enemyRadius: 115,
      maxDanger: 1.0,
      extraDamping: 0.10
    };

    // 爆弾の慣性投擲。
    // 後退しながら投げたとき、自機近くに一瞬だけ留まってから前方へ流れる。
    const BOMB_PHYSICS = {
      holdFrames: 26,
      inheritedVelocityScale: 0.55,
      forwardVy: -2.15
    };

    // 眠っている／隊列待機中の敵に接触したときの「ぽよーん」反発。
    // 即死ではなく、短時間だけ弾への事故を防ぐ無敵を付ける。
    const DORMANT_BUMP = {
      radiusPadding: 10,
      impulse: 7.8,
      bounce: 1.15,
      minBounceSpeed: 4.8,
      pushOutPadding: 4,
      maxPushOut: 22,
      cooldown: 18,
      invul: 18,
      enemyKick: 12,
      wakeRadius: 72
    };

    // 爆弾・ブラスターが眠り編隊を刺激する半径。
    // 爆風中心では撃破、外縁では起床という挙動にする。
    const WAKEUP_WEAPONS = {
      blasterRadius: 76,
      bombWakeExtra: 105
    };


    const SCRAMBLE = {
      threshold: 5,
      escapeChance: 0.18,
      maxSimultaneousDivers: 3,
      rediveMax: 2,
      speedBonus: 1.12
    };

    const RETURN_TUNING = {
      upperFormationMargin: 120,
      visibleReturnFrames: 118,
      quietReturnFrames: 150
    };

    const gamepadState = {
      name: '',
      active: false,
      dx: 0,
      dy: 0,
      power: 0,
      prevButtons: []
    };

    const GAMEPAD = {
      deadZone: 0.22,
      digitalPower: 0.72,
      accel: 0.46,
      // Xbox標準：
      // A = 0, B = 1, X = 2
      // 操作割当：A=SHOT / X=BOMB / B=BOOST
      shotButton: 0,
      bombButton: 2,
      boostButton: 1,
      modeButton: 8
    };

    let starOffsetX = 0;
    let starOffsetY = 0;

    // 航法メッシュはワールド座標ベース。
    // 実際に動いた分だけ目盛りが動き、ズームに応じて粗密が変わる。
    const NAV_GRID = 160;
    const NAV_MAJOR_EVERY = 4;

    function playerBaseX() { return W / 2; }
    function playerBaseY() {
      // PCは操作パネルを消したぶん、自機をさらに画面下へ置く。
      // スマホは下部UIとの干渉を避けるため従来位置。
      return isTouchLayout() ? battleH * 0.78 : battleH * 0.86;
    }

    function shiftWorld(dx, dy) {
      enemies.forEach(e => {
        e.x += dx; e.y += dy;
        e.homeX += dx; e.homeY += dy;
        if (e.diveStartX !== undefined) e.diveStartX += dx;
        if (e.diveStartY !== undefined) e.diveStartY += dy;
        if (e.diveControlX !== undefined) e.diveControlX += dx;
        if (e.diveControlY !== undefined) e.diveControlY += dy;
        if (e.diveAimX !== undefined) e.diveAimX += dx;
        if (e.diveAimY !== undefined) e.diveAimY += dy;
        if (e.diveTargetX !== undefined) e.diveTargetX += dx;
        if (e.diveTargetY !== undefined) e.diveTargetY += dy;
        if (e.returnFromX !== undefined) e.returnFromX += dx;
        if (e.returnFromY !== undefined) e.returnFromY += dy;
      });
      bullets.forEach(o => { o.x += dx; o.y += dy; });
      enemyBullets.forEach(o => { o.x += dx; o.y += dy; });
      bombs.forEach(o => { o.x += dx; o.y += dy; });
      explosions.forEach(o => { o.x += dx; o.y += dy; });
      particles.forEach(o => { o.x += dx; o.y += dy; });

      // メテオ警告線も実座標上の投影なので、世界移動に追随させる。
      meteorWarnings.forEach(w => {
        w.x1 += dx; w.y1 += dy;
        w.x2 += dx; w.y2 += dy;
      });

      // 遠方編隊もプレイヤー相対の位置として動かす。
      // 自機を基準に世界をずらしているので、同じだけ平行移動する。
      squadrons.forEach(s => {
        s.x += dx;
        s.y += dy;
      });

      starOffsetX += dx;
      starOffsetY += dy;
    }

    const buttons = [];
    function layoutButtons() {
      buttons.length = 0;
      if (!isTouchLayout()) return;

      const labels = ['BOMB', 'SHOT', 'BOOST'];
      const gap = 10;
      const bh = Math.min(58, panelH * 0.48);
      const y = battleH + panelH * 0.36;

      // スマホ：左側は仮想スティック用に空け、右側に3ボタンを並べる。
      const startX = W * 0.45;
      const bw = (W - startX - gap * 4) / 3;
      for (let i = 0; i < 3; i++) {
        buttons.push({
          label: labels[i],
          x: startX + gap + i * (bw + gap),
          y,
          w: bw,
          h: bh,
          down: false
        });
      }

      // FULLボタンは上部UIへ移動。
    }

    const bullets = [];
    const enemyBullets = [];
    const bombs = [];
    const explosions = [];
    const enemies = [];
    const particles = [];
    const meteorWarnings = [];

    // 宙域内の遠方編隊。
    // 実体の敵機としては生成せず、プレイヤーからの相対位置だけを持つ。
    // 近づいたときだけ spawnSquadron() で実体化する。
    const squadrons = [];
    let squadronSeq = 1;

    let time = 0;
    let cameraScale = isTouchLayout() ? 0.92 : 1.20;
    let targetScale = isTouchLayout() ? 0.92 : 1.20;
    const ENEMY_VISUAL_SCALE = 1.5; // 見た目だけ拡大。実当たり判定は r=9 で、見た目より少し小さめ。
    const ZOOM_LEVELS = [0.3, 0.7, 1.0, 1.25, 1.5];
    let zoomIndex = 1;
    let autoZoom = true;
    let score = 0;

    // Dramatic Camera:
    // 最初はしれっとクラシックな単一編隊戦として始め、
    // 戦闘が動いたら寄り、静まったら中角〜広角で宙域の広がりを見せる。
    const CAMERA_DRAMA = {
      introClassicFrames: 1800,
      universeRevealStart: 1800,
      universeRevealEnd: 2280,
      revealBlipsAfter: 1800,
      introMinZoomPC: 0.92,
      introMinZoomMobile: 0.86,

      // このゲームの基本は「弾幕をくぐる戦闘級カメラ」。
      // 広域宙域は、戦闘が切れたときだけ少し見える程度にする。
      battleZoomPC: 1.38,
      battleZoomMobile: 1.14,
      duelZoomPC: 1.18,
      duelZoomMobile: 1.04,
      midZoomPC: 0.72,
      midZoomMobile: 0.68,
      cruiseZoomPC: 0.44,
      cruiseZoomMobile: 0.48,

      // 「危ない/撃っている/敵が動いている」とみなす範囲を広めに取る。
      // これにより、戦闘が始まった瞬間に豆粒視点から戻る。
      bulletNearRadius: 560,
      diverNearRadius: 680,
      closeCombatRadius: 420,
      combatHoldFrames: 180,
      calmEnemyBulletLimit: 0
    };

    let lastBattleMotionTime = -99999;

    function smoothstep01(x) {
      x = Math.max(0, Math.min(1, x));
      return x * x * (3 - 2 * x);
    }

    function getUniverseReveal() {
      const start = CAMERA_DRAMA.universeRevealStart;
      const end = CAMERA_DRAMA.universeRevealEnd;
      if (time <= start) return 0;
      if (time >= end) return 1;
      return smoothstep01((time - start) / Math.max(1, end - start));
    }

    function applyIntroZoomOutSuppression(baseZoom) {
      // 最初の30秒は「普通のギャラクシアン」に見えるよう、
      // 大きくズームアウトすることだけを抑制する。
      // 30〜38秒で制限をなめらかに外し、38秒後は完全に通常カメラへ戻す。
      const reveal = getUniverseReveal();

      // ここが重要。
      // reveal が 1 になった後も Math.max(baseZoom, 0.30) をかけ続けると、
      // 目標倍率や不感帯の影響で、実質的にズーム下限が残って見える。
      // 宇宙開示後は制限そのものを完全に外す。
      if (reveal >= 0.999) return baseZoom;

      const introMin = isTouchLayout() ? CAMERA_DRAMA.introMinZoomMobile : CAMERA_DRAMA.introMinZoomPC;
      const normalMin = 0.30;
      const minZoom = introMin * (1 - reveal) + normalMin * reveal;
      return Math.max(baseZoom, minZoom);
    }

    function aliveEnemies() {
      return enemies.filter(e => e.state !== 'gone');
    }

    function countActiveSquadronsForCamera() {
      let active = 0;
      let sleeping = 0;
      let visible = 0;
      for (const s of squadrons) {
        if (s.cleared || s.state === SQUADRON_STATE.CLEARED) continue;
        if (s.visible) visible++;
        if (s.state === SQUADRON_STATE.ACTIVE) active++;
        if (s.state === SQUADRON_STATE.SLEEPING) sleeping++;
      }
      return { active, sleeping, visible };
    }

    function cameraEnemyDrawScale() {
      // カメラを引いたときだけ敵の見た目を少し持ち上げる。
      // 当たり判定は変えず、「広い宙域なのに豆粒すぎる」を避ける。
      const inverseBoost = Math.max(1, Math.min(2.25, 0.86 / Math.max(cameraScale, 0.25)));
      return ENEMY_VISUAL_SCALE * inverseBoost;
    }

    function cycleZoom() {
      // Zキー：自動ズームON/OFF。OFF時は 0.3 / 0.7 / 1.0 / 1.25 / 1.5 を手動切替。
      if (autoZoom) {
        autoZoom = false;
        zoomIndex = 1;
      } else {
        zoomIndex = (zoomIndex + 1) % ZOOM_LEVELS.length;
        if (zoomIndex === 0) autoZoom = true;
      }
      targetScale = autoZoom ? computeAutoZoom() : ZOOM_LEVELS[zoomIndex];
    }

    function zoomPulse(scale) {
      targetScale = Math.max(targetScale, scale);
    }

    function computeAutoZoom() {
      const alive = aliveEnemies();
      if (alive.length === 0) return isTouchLayout() ? CAMERA_DRAMA.cruiseZoomMobile : CAMERA_DRAMA.cruiseZoomPC;

      const introClassic = time < CAMERA_DRAMA.introClassicFrames;
      const camCounts = countActiveSquadronsForCamera();

      let nearest = Infinity;
      let nearby = 0;
      let nearestDiver = Infinity;
      let nearestActiveFormation = Infinity;
      let nearestSleepingFormation = Infinity;
      const formationEnemies = [];
      const centerX = player.x;
      const centerY = player.y;

      for (const e of alive) {
        const d = Math.hypot(e.x - centerX, e.y - centerY);
        if (d < nearest) nearest = d;
        if (d < 260) nearby++;

        if (e.state === 'dive') {
          if (d < nearestDiver) nearestDiver = d;
        }

        if (e.state === 'active') {
          if (d < nearestActiveFormation) nearestActiveFormation = d;
          formationEnemies.push(e);
        } else if (e.state === 'sleep') {
          if (d < nearestSleepingFormation) nearestSleepingFormation = d;
          formationEnemies.push(e);
        }
      }

      let enemyBulletNear = false;
      for (const b of enemyBullets) {
        const d = Math.hypot(b.x - player.x, b.y - player.y);
        if (d < CAMERA_DRAMA.bulletNearRadius) {
          enemyBulletNear = true;
          break;
        }
      }

      // 「戦闘が動いている」条件。
      // こちらが撃っている、敵弾がある、突撃している、敵機が近い。
      // このときは、豆粒バトルを避けてすばやく戦闘ズームへ戻す。
      const playerFiring = bullets.length > 0 || bombs.length > 0 || player.shotCooldown > 0;
      const enemyFire = enemyBullets.length > CAMERA_DRAMA.calmEnemyBulletLimit || enemyBulletNear;
      const diverNear = nearestDiver < CAMERA_DRAMA.diverNearRadius;
      const closeCombat = nearby >= 1 || nearest < CAMERA_DRAMA.closeCombatRadius;
      const battleMotion = playerFiring || enemyFire || diverNear || closeCombat;
      if (battleMotion) lastBattleMotionTime = time;
      const recentBattle = time - lastBattleMotionTime < CAMERA_DRAMA.combatHoldFrames;

      const battleZoom = isTouchLayout() ? CAMERA_DRAMA.battleZoomMobile : CAMERA_DRAMA.battleZoomPC;
      const duelZoom = isTouchLayout() ? CAMERA_DRAMA.duelZoomMobile : CAMERA_DRAMA.duelZoomPC;
      const midZoom = isTouchLayout() ? CAMERA_DRAMA.midZoomMobile : CAMERA_DRAMA.midZoomPC;
      const cruiseZoom = isTouchLayout() ? CAMERA_DRAMA.cruiseZoomMobile : CAMERA_DRAMA.cruiseZoomPC;

      let desired;

      if (introClassic) {
        // 序盤は、あえて昔のギャラクシアンのように「単一編隊ゲーム」に見せる。
        desired = Math.max(duelZoom, Math.min(battleZoom, computeFormationFitZoom(formationEnemies)));
      } else if (battleMotion || recentBattle) {
        // 戦闘が始まったら、すぐに「避けて撃つ」視点へ戻す。
        // 弾や突撃が一瞬途切れても少し保持し、カメラがすぐ引かないようにする。
        desired = battleMotion ? battleZoom : duelZoom;
        if (!enemyFire && !diverNear && nearestActiveFormation > 520 && !playerFiring) desired = duelZoom;
      } else if (camCounts.active >= 2) {
        // 2編隊が起きているが、弾や突撃が少ない瞬間。
        // ここで少し引いて「広い宙域の戦線」を見せる。
        desired = midZoom;
      } else if (camCounts.active === 1 && (camCounts.sleeping > 0 || camCounts.visible > 1)) {
        desired = Math.max(midZoom, cruiseZoom + 0.08);
      } else if (nearestSleepingFormation < 1900 || camCounts.visible > 0) {
        desired = cruiseZoom + 0.04;
      } else {
        desired = cruiseZoom;
      }

      // 隊列が半分切れそうなときは少しだけ引く。
      // ただし戦闘中は「見やすさ」を優先して、引きすぎない。
      if (formationEnemies.length >= 3) {
        const fitZoom = computeFormationFitZoom(formationEnemies);
        if (battleMotion) {
          // 実戦中は「隊列全体を収める」計算でズームアップを殺さない。
          // 以前は fitZoom + 0.10 が 1.15 前後になると、PCでもそこで頭打ちになっていた。
          // 弾避け・接近戦では、豆粒バトル回避を優先して battleZoom をそのまま使う。
          desired = Math.max(desired, battleZoom);
        } else if (recentBattle) {
          // 戦闘直後の余韻では、少しだけ隊列フィットを考慮する。
          // ただし 1.15 付近で固定されないよう、PCは duelZoom 以上を下限にする。
          const combatFloor = isTouchLayout() ? 0.98 : duelZoom;
          const softCap = Math.max(combatFloor, Math.min(battleZoom, fitZoom + 0.18));
          desired = Math.min(desired, softCap);
        } else {
          desired = Math.min(desired, Math.max(0.30, Math.min(1.00, fitZoom)));
        }
      }

      return Math.max(0.30, Math.min(maxAutoZoom(), desired));
    }

    function computeFormationFitZoom(list) {
      // プレイヤー位置を中心にズームしたとき、隊列全体が戦闘エリアに入る最大ズーム率。
      // ギャラクシアン的な「隊列の見え」を優先し、特に隊列上端に余白を残す。
      let maxZoom = 1.50;
      const visualR = 15;      // 敵の見た目半径に近い安全幅
      const sideMargin = 28;
      const topMargin = 58;    // 隊列上端は画面上から少し余裕を取る
      const bottomMargin = 42;
      const px = player.x;
      const py = player.y;
      const left = sideMargin;
      const right = W - sideMargin;
      const top = topMargin;
      const bottom = battleH - bottomMargin;

      let minY = Infinity;
      let maxY = -Infinity;

      for (const e of list) {
        const exLeft = e.x - visualR;
        const exRight = e.x + visualR;
        const eyTop = e.y - visualR;
        const eyBottom = e.y + visualR;
        minY = Math.min(minY, eyTop);
        maxY = Math.max(maxY, eyBottom);

        const dxRight = exRight - px;
        const dxLeft = exLeft - px;
        const dyBottom = eyBottom - py;
        const dyTop = eyTop - py;

        if (dxRight > 0) maxZoom = Math.min(maxZoom, (right - px) / dxRight);
        if (dxLeft < 0) maxZoom = Math.min(maxZoom, (px - left) / -dxLeft);
        if (dyBottom > 0) maxZoom = Math.min(maxZoom, (bottom - py) / dyBottom);
        if (dyTop < 0) maxZoom = Math.min(maxZoom, (py - top) / -dyTop);
      }

      // 隊列上端が画面上から少しだけ余白を取る位置に来ることを強く優先。
      // 自機が後退しているときも、隊列全体が切れないようにする。
      if (Number.isFinite(minY) && minY < py) {
        maxZoom = Math.min(maxZoom, (py - topMargin) / (py - minY));
      }

      if (!Number.isFinite(maxZoom)) return 1.00;
      return Math.max(0.30, Math.min(1.50, maxZoom));
    }

    const SQUADRON_STATE = {
      DORMANT: 'dormant',      // まだ実体化していない遠方反応
      SLEEPING: 'sleeping',    // 宇宙にはいるが寝ている
      ACTIVE: 'active',        // 起きて戦闘AIが動く
      CLEARED: 'cleared'
    };

    const SQUADRON_KIND = {
      MINOR: 'minor',
      MAJOR: 'major'
    };

    const SQUADRON_MODE = {
      FORMATION: 'formation',
      SCRAMBLE: 'scramble'
    };

    const SQUADRON_TUNING = {
      sensorDistance: 4200,
      materializeDistance: 2300,
      sleeperMaterializeDistance: 3300,
      sleeperWakeScale: 0.42,
      minorSquadronScrambleCount: 5,
      minorWakeDistance: 1500,
      majorWakeDistance: 1050,
      minorSleepDistance: 2500,
      majorSleepDistance: 1800,
      maxActiveMinor: 7,
      maxActiveMajor: 2
    };

    let spawningSquadronId = null;

    // クラシック編隊は、その場の戦闘密度を作るためのローカル遭遇。
    // 航路編隊とは違い、宙域を大きく離れるとリセットされ、また現れる。
    // ただし航路編隊の撃破状態は保持し、復活させない。
    const CLASSIC_ENCOUNTER_TUNING = {
      resetDistance: 2500,      // この距離だけ航行したら、途中のクラシック編隊は宙域外扱い
      respawnDistance: 900,     // 壊滅後、この距離だけ離れたら次のクラシック編隊
      respawnCooldown: 90
    };

    const classicEncounter = {
      anchorX: 0,
      anchorY: 0,
      cooldown: 0,
      generation: 0
    };

    function classicTravelDistance() {
      return Math.hypot(starOffsetX - classicEncounter.anchorX, starOffsetY - classicEncounter.anchorY);
    }

    function isClassicEnemy(e) {
      return e.squadronId == null && e.classicEncounter === true;
    }

    function classicEnemiesAlive() {
      return enemies.filter(e => isClassicEnemy(e) && e.state !== 'gone');
    }

    function removeClassicEncounterEnemies() {
      for (let i = enemies.length - 1; i >= 0; i--) {
        if (isClassicEnemy(enemies[i])) enemies.splice(i, 1);
      }
    }

    function updateClassicEncounterLifecycle() {
      classicEncounter.cooldown = Math.max(0, classicEncounter.cooldown - 1);

      const alive = classicEnemiesAlive().length;
      const dist = classicTravelDistance();

      // 途中のクラシック編隊を引きずったまま航路編隊とすれ違わないようにする。
      // 宙域を十分離れたら、帰還アニメなしで「もう元に戻った」扱いにする。
      if (alive > 0 && dist > CLASSIC_ENCOUNTER_TUNING.resetDistance) {
        removeClassicEncounterEnemies();
        classicEncounter.cooldown = CLASSIC_ENCOUNTER_TUNING.respawnCooldown;
        spawnFormation();
        return;
      }

      // 倒し切った場合も、その場では復活しない。
      // プレイヤーが宙域を離れたら、次のクラシック遭遇として再配置する。
      if (alive === 0 && dist > CLASSIC_ENCOUNTER_TUNING.respawnDistance && classicEncounter.cooldown <= 0) {
        spawnFormation();
      }
    }

    function squadronKindForType(type) {
      if (type === 'regular' || type === 'heavyRegular') return SQUADRON_KIND.MAJOR;
      return SQUADRON_KIND.MINOR;
    }

    function squadronModeForType(type) {
      // 編隊ごとの性格。
      // 大型・編隊長つきは整列帰還を重視。
      // 小隊・紫遊撃隊は、遭遇後すぐ散開して戦場を荒らす。
      if (type === 'smallPatrol' || type === 'purpleRaiders') return SQUADRON_MODE.SCRAMBLE;
      return SQUADRON_MODE.FORMATION;
    }

    function seedSquadrons() {
      squadrons.length = 0;
      squadronSeq = 1;

      // 「宙域航路」型配置。
      // 敵は湧くのではなく、航路上に最初から存在する。
      // 遠方では軽いセンサー反応、近づくと寝ている実体、さらに近づくと起動する。
      const corridor = [
        { y: -430,  x:   30, type: 'purpleRaiders' },
        { y: -720,  x: -135, type: 'smallPatrol', sleeper: true },
        { y: -990,  x:  115, type: 'regular' },
        { y: -1320, x:  -70, type: 'commanderOnly', sleeper: true },
        { y: -1660, x:  170, type: 'smallPatrol' },
        { y: -1980, x: -150, type: 'purpleRaiders', sleeper: true },
        { y: -2350, x:   65, type: 'regular' },
        { y: -2780, x:  205, type: 'commanderOnly' },
        { y: -3180, x: -120, type: 'smallPatrol', sleeper: true },
        { y: -3600, x:   90, type: 'regular', sleeper: true },
        { y: -4080, x: -210, type: 'purpleRaiders' },
        { y: -4550, x:   45, type: 'regular', sleeper: true }
      ];

      corridor.forEach(c => {
        const kind = squadronKindForType(c.type);
        squadrons.push({
          id: squadronSeq++,
          x: c.x,
          y: c.y,
          type: c.type,
          kind,
          mode: c.mode || squadronModeForType(c.type),
          allowLowCountScramble: c.allowLowCountScramble !== undefined ? !!c.allowLowCountScramble : kind === SQUADRON_KIND.MINOR,
          state: SQUADRON_STATE.DORMANT,
          visible: false,
          spawned: false,
          activated: false,
          cleared: false,
          alertTimer: 0,
          sleepPhase: Math.random() * Math.PI * 2,
          sleeper: !!c.sleeper
        });
      });
    }

    function activeSquadronCounts() {
      let minor = 0;
      let major = 0;
      for (const s of squadrons) {
        if (s.state !== SQUADRON_STATE.ACTIVE || s.cleared) continue;
        if (s.kind === SQUADRON_KIND.MINOR) minor++;
        else major++;
      }
      return { minor, major };
    }

    function enemiesForSquadron(s) {
      return enemies.filter(e => e.squadronId === s.id && e.state !== 'gone');
    }

    function combatAliveForSquadron(s) {
      let n = 0;
      for (const e of enemies) {
        if (e.squadronId !== s.id || e.state === 'gone') continue;
        // 護衛は補充や随伴で数が揺れるため、スクランブル判定の母数から外す。
        if (e.role === 'guard') continue;
        n++;
      }
      return n;
    }

    function getSquadronById(id) {
      if (id == null) return null;
      return squadrons.find(s => s.id === id) || null;
    }

    function updateSquadronBattleModes() {
      // 低残数でスクランブルへ移行するかどうかも、編隊ごとの許可で決める。
      // これにより、大型整列編隊まで巻き込まれて帰還しなくなる事故を防ぐ。
      for (const s of squadrons) {
        if (s.cleared || s.state !== SQUADRON_STATE.ACTIVE) continue;
        if (!s.allowLowCountScramble) continue;
        if (s.mode === SQUADRON_MODE.SCRAMBLE) continue;
        const n = combatAliveForSquadron(s);
        if (n > 0 && n <= SQUADRON_TUNING.minorSquadronScrambleCount) {
          s.mode = SQUADRON_MODE.SCRAMBLE;
        }
      }
    }

    function isSquadronScramble(s) {
      return !!s && s.mode === SQUADRON_MODE.SCRAMBLE;
    }

    function anyScrambleMode() {
      for (const s of squadrons) {
        if (s.cleared || s.state !== SQUADRON_STATE.ACTIVE) continue;
        if (isSquadronScramble(s)) return true;
      }
      return isClassicScrambleMode();
    }

    function setSquadronEnemiesState(s, nextState) {
      for (const e of enemies) {
        if (e.squadronId !== s.id) continue;

        // 突撃中や帰還中を無理に寝かせると軌道が壊れるので、隊列内の敵だけ切り替える。
        if (nextState === 'sleep') {
          if (e.state === 'sleep' || e.state === 'active' || e.state === 'return') {
            e.state = 'sleep';
            e.alert = 0;
            e.diveDelay = e.role === 'commander'
              ? 280 + Math.random() * 260
              : 120 + Math.random() * 260;
          }
        } else if (nextState === 'active') {
          if (e.state === 'sleep') {
            e.state = 'active';
            e.alert = 1;
            e.diveDelay = Math.min(e.diveDelay || 80, 45 + Math.random() * 120);
          }
        }
      }
    }


    function enemyScreenPosition(e) {
      return {
        x: (e.x - player.x) * cameraScale + W / 2,
        y: (e.y - player.y) * cameraScale + battleH / 2
      };
    }

    function enemyComfortablyOffscreen(e, margin = 190) {
      const sp = enemyScreenPosition(e);
      return sp.x < -margin || sp.x > W + margin || sp.y < -margin || sp.y > battleH + margin;
    }

    function instantReturnEnemyToHome(e, nextState = 'sleep') {
      // 撃破済みは復活させない。あくまで「生きているが画面外に抜けた敵」の整列だけ。
      if (e.state === 'gone') return;

      e.x = e.homeX;
      e.y = e.homeY;
      e.state = nextState;
      e.alert = nextState === 'active' ? 1 : 0;
      e.diveT = 0;
      e.returnT = 0;
      e.offscreenT = 0;
      e.rediveCount = 0;
      e.sortieGroupStarted = false;
      e.impactWarned = false;
      e.impactWarningLife = 0;
      e.meteorInit = false;
      e.meteorLaunched = false;
      e.coastVX = 0;
      e.coastVY = 0;
      e.firedShots = 0;
      e.fireTimes = null;

      delete e.diveStartX;
      delete e.diveStartY;
      delete e.diveControlX;
      delete e.diveControlY;
      delete e.diveAimX;
      delete e.diveAimY;
      delete e.diveTargetX;
      delete e.diveTargetY;
      delete e.returnFromX;
      delete e.returnFromY;

      e.diveDelay = e.role === 'commander'
        ? 300 + Math.random() * 280
        : 160 + Math.random() * 300;
      e.returnMode = null;
    }

    function belongsToUpperFormation(e) {
      return e.squadronId != null && e.homeY < player.y - RETURN_TUNING.upperFormationMargin;
    }

    function beginAlienReturn(e, dir = 1) {
      // 126版の「上から隊列へ戻る」美しい帰還は残す。
      // ただし、一度自機より下・画面下側へ抜けた機体を home に瞬間配置すると、
      // 航路編隊だけ「ぱっと現れる」ように見えてしまう。
      // そこで下へ抜けた機体は、裏で画面上方へ回り込ませ、そこから可視帰還させる。
      const upperFormation = belongsToUpperFormation(e);
      let rerouteFromTop = false;

      if (upperFormation) {
        const sp = enemyScreenPosition(e);
        const belowPlayer = e.y > player.y + 80;
        const belowScreen = sp.y > battleH + 36;
        rerouteFromTop = belowPlayer || belowScreen;
      }

      e.state = 'return';
      e.returnT = 0;
      e.returnSide = dir || e.returnSide || 1;
      e.impactWarned = false;
      e.impactWarningLife = 0;
      e.meteorInit = false;
      e.meteorLaunched = false;
      e.sortieGroupStarted = false;

      if (upperFormation) {
        e.returnMode = 'visibleUpper';
        e.returnDuration = RETURN_TUNING.visibleReturnFrames;

        if (rerouteFromTop) {
          // 下から上へ画面を横切る帰還は見せない。
          // 代わりに画面上端付近から降りてくる帰還として再開する。
          const topWorldY = player.y + (0 - battleH * 0.05 - player.y) / Math.max(cameraScale, 0.1);
          const side = e.returnSide || 1;
          e.returnFromX = e.homeX + side * (70 + Math.random() * 45);
          e.returnFromY = Math.min(topWorldY, e.homeY - 180);
        } else {
          e.returnFromX = Math.max(-90, Math.min(W + 90, e.x));
          e.returnFromY = Math.max(-130, Math.min(battleH + 130, e.y));
        }

        e.x = e.returnFromX;
        e.y = e.returnFromY;
      } else {
        e.returnMode = 'quietTop';
        e.returnDuration = RETURN_TUNING.quietReturnFrames;
        e.returnFromX = e.homeX;
        const topWorldY = player.y + (0 - player.y) / Math.max(cameraScale, 0.1);
        e.returnFromY = Math.min(topWorldY - 90, e.homeY - 220);
        e.x = e.returnFromX;
        e.y = e.returnFromY;
      }
    }

    function combatFocusSquadronId() {
      // いま画面上で「主戦闘」に見えている編隊を一つだけ選ぶ。
      // これ以外の編隊は、画面外に抜けたら帰還アニメを省略してよい。
      let bestId = null;
      let bestScore = -Infinity;

      for (const e of enemies) {
        if (e.state === 'gone' || e.squadronId == null) continue;

        const d = Math.hypot(e.x - player.x, e.y - player.y);
        const sp = enemyScreenPosition(e);
        const onScreen = sp.x > -40 && sp.x < W + 40 && sp.y > -60 && sp.y < battleH + 80;

        let score = 0;
        if (e.state === 'dive') score += 900;
        if (e.state === 'active') score += 360;
        if (e.state === 'return') score += 120;
        if (onScreen) score += 240;
        score += Math.max(0, 900 - d);

        if (score > bestScore) {
          bestScore = score;
          bestId = e.squadronId;
        }
      }

      return bestScore > 260 ? bestId : null;
    }

    function cleanupDistantNonFocusAliens() {
      const focusId = combatFocusSquadronId();
      const activeCounts = activeSquadronCounts();
      const multipleActiveSquadrons = activeCounts.minor + activeCounts.major >= 2;

      for (const e of enemies) {
        if (e.state === 'gone' || e.squadronId == null) continue;
        // 可視帰還中の敵は cleanup で home に瞬間配置しない。
        // ここを通すと、航路編隊だけ「ぱっと現れる」原因になる。
        if (e.state === 'return') continue;

        const s = squadrons.find(q => q.id === e.squadronId);
        if (!s || s.cleared || s.state === SQUADRON_STATE.CLEARED) continue;

        const d = Math.hypot(e.x - player.x, e.y - player.y);
        const off = enemyComfortablyOffscreen(e, 190);
        const far = d > (s.kind === SQUADRON_KIND.MINOR ? 1550 : 1850);
        const notFocus = focusId !== null && e.squadronId !== focusId;
        const squadronSleepingOrDistant = s.state === SQUADRON_STATE.SLEEPING || d > 2300;

        // 別編隊との戦闘中、または通り過ぎた遠方編隊は、画面外なら「もう戻った」ことにする。
        // これで帰還機が延々と画面を横切る問題を減らす。
        if (off && (far || squadronSleepingOrDistant) && (notFocus || multipleActiveSquadrons || s.state === SQUADRON_STATE.SLEEPING)) {
          const nextState = s.state === SQUADRON_STATE.ACTIVE ? 'active' : 'sleep';
          instantReturnEnemyToHome(e, nextState);
        }
      }
    }

    function updateSleepingSquadron(s) {
      // 寝ている編隊はAIを回さず、隊列全体がほんの少し漂うだけ。
      s.sleepPhase += 0.012;
      const driftX = Math.sin(s.sleepPhase * 0.73 + s.id) * 0.10;
      const driftY = Math.cos(s.sleepPhase * 0.57 + s.id) * 0.07;
      s.x += driftX;
      s.y += driftY;
      for (const e of enemies) {
        if (e.squadronId !== s.id) continue;
        if (e.state !== 'sleep') continue;
        e.homeX += driftX;
        e.homeY += driftY;
      }
    }

    function updateSquadrons() {
      let counts = activeSquadronCounts();

      for (const s of squadrons) {
        if (s.cleared || s.state === SQUADRON_STATE.CLEARED) continue;

        const d = Math.hypot(s.x - player.x, s.y - player.y);
        s.visible = d < SQUADRON_TUNING.sensorDistance;

        // 近づいたら、まず「寝ている実体」として宇宙に置く。
        // 眠り編隊はより遠くから実体化し、しれっと航路上に存在している感じを出す。
        // ここではまだAIを起こさない。
        const materializeDistance = s.sleeper
          ? SQUADRON_TUNING.sleeperMaterializeDistance
          : SQUADRON_TUNING.materializeDistance;
        if (!s.spawned && d < materializeDistance) {
          s.spawned = true;
          s.state = SQUADRON_STATE.SLEEPING;
          spawnSquadron(s);
          setSquadronEnemiesState(s, 'sleep');
        }

        if (!s.spawned) continue;

        const squadEnemies = enemiesForSquadron(s);
        if (squadEnemies.length === 0) {
          s.cleared = true;
          s.state = SQUADRON_STATE.CLEARED;
          continue;
        }

        const isMinor = s.kind === SQUADRON_KIND.MINOR;
        const baseWakeDist = isMinor ? SQUADRON_TUNING.minorWakeDistance : SQUADRON_TUNING.majorWakeDistance;
        const wakeDist = s.sleeper ? baseWakeDist * SQUADRON_TUNING.sleeperWakeScale : baseWakeDist;
        const sleepDist = isMinor ? SQUADRON_TUNING.minorSleepDistance : SQUADRON_TUNING.majorSleepDistance;

        if (s.state === SQUADRON_STATE.SLEEPING) {
          updateSleepingSquadron(s);

          // 小編隊は宇宙の交通量担当なので起きやすい。
          // 大編隊は2つまで。同時遭遇の迫力は出すが、CPUと画面密度は守る。
          const canWakeMinor = isMinor && counts.minor < SQUADRON_TUNING.maxActiveMinor;
          const canWakeMajor = !isMinor && counts.major < SQUADRON_TUNING.maxActiveMajor;
          if (d < wakeDist && (canWakeMinor || canWakeMajor)) {
            s.state = SQUADRON_STATE.ACTIVE;
            s.activated = true;
            s.alertTimer = isMinor ? 260 : 420;
            setSquadronEnemiesState(s, 'active');
            if (isMinor) counts.minor++;
            else counts.major++;
          }
        } else if (s.state === SQUADRON_STATE.ACTIVE) {
          s.alertTimer = Math.max(0, (s.alertTimer || 0) - 1);

          // 近くにいる間は警戒継続。通り過ぎてほとぼりが冷めたら寝る。
          if (d < wakeDist * 1.12) {
            s.alertTimer = Math.max(s.alertTimer, isMinor ? 180 : 300);
          }

          if (d > sleepDist && s.alertTimer <= 0) {
            s.state = SQUADRON_STATE.SLEEPING;
            s.activated = false;
            setSquadronEnemiesState(s, 'sleep');
            if (isMinor) counts.minor = Math.max(0, counts.minor - 1);
            else counts.major = Math.max(0, counts.major - 1);
          }
        }
      }
    }

    function spawnSquadron(s) {
      spawningSquadronId = s.id;
      try {
        if (s.type === 'commanderOnly') {
          spawnCommanderPatrol(s.x, s.y);
        } else if (s.type === 'purpleRaiders') {
          spawnPurpleRaiders(s.x, s.y);
        } else if (s.type === 'smallPatrol') {
          spawnSmallPatrol(s.x, s.y);
        } else {
          spawnRemoteRegularFormation(s.x, s.y);
        }
      } finally {
        spawningSquadronId = null;
      }
    }

    function spawnSmallPatrol(cx, cy) {
      const offsets = [
        { x: -58, y:  0, type: 'normal' },
        { x: -24, y: 26, type: 'purple' },
        { x:  24, y: 26, type: 'normal' },
        { x:  58, y:  0, type: 'angry' },
        { x:   0, y: 54, type: 'normal' }
      ];
      offsets.forEach(off => pushEnemyAt(cx + off.x, cy + off.y, off.type));
    }

    function pushEnemyAt(hx, hy, type, role = 'soldier', commanderId = null, guardingCommanderId = null) {
      const isCommander = role === 'commander';
      enemies.push({
        homeX: hx,
        homeY: hy,
        x: hx,
        y: hy,
        r: isCommander ? 12 : 9,
        state: 'sleep',
        phase: Math.random() * Math.PI * 2,
        hp: isCommander ? 2 : 1,
        role,
        commanderId,
        guardingCommanderId,
        squadronId: spawningSquadronId,
        alert: 0,
        diveT: 0,
        diveDelay: isCommander ? 240 + Math.random() * 180 : 80 + Math.random() * 220,
        type,
        rediveMax: 1,
        rediveCount: 0,
        evadeCharges: 999,
        evadeCooldown: 0,
        evadeOffsetX: 0,
        evadeOffsetY: 0,
        impactWarned: false,
        impactWarningLife: 0
      });
    }

    function spawnRemoteRegularFormation(cx, cy) {
      const cols = 5;
      const rows = 3;
      const gapX = 38;
      const gapY = 31;
      const sx = cx - (cols - 1) * gapX / 2;
      const sy = cy;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const type = row === 0 ? 'purple' : (Math.random() < 0.10 ? 'angry' : 'normal');
          pushEnemyAt(sx + col * gapX, sy + row * gapY, type);
        }
      }
    }

    function spawnPurpleRaiders(cx, cy) {
      const cols = 6;
      const gapX = 50;
      const sx = cx - (cols - 1) * gapX / 2;

      for (let col = 0; col < cols; col++) {
        pushEnemyAt(sx + col * gapX, cy + Math.sin(col) * 12, 'purple');
      }
    }

    function spawnCommanderPatrol(cx, cy) {
      const cid = 'P' + Math.floor(Math.random() * 1000000);
      pushEnemyAt(cx, cy, 'commander', 'commander', cid, null);

      // 少数護衛だけの哨戒隊。残存数が少ないので、実体化するとスクランブルに入りやすい。
      const offsets = [
        { x: -42, y: 34 },
        { x:  42, y: 34 },
        { x:   0, y: 62 }
      ];

      offsets.forEach(off => {
        pushEnemyAt(cx + off.x, cy + off.y, 'guard', 'guard', null, cid);
      });
    }

    function nearestInactiveSquadron() {
      let best = null;
      let bestD = Infinity;
      for (const s of squadrons) {
        if (s.activated || s.cleared) continue;
        const d = Math.hypot(s.x - player.x, s.y - player.y);
        if (d < bestD) {
          bestD = d;
          best = s;
        }
      }
      return best ? { squadron: best, distance: bestD } : null;
    }

    function drawSquadronBlips() {
      if (time < CAMERA_DRAMA.revealBlipsAfter) return;
      // 未遭遇編隊を遠距離センサー反応として薄く表示。
      // 敵本体ではなく、あくまで宙域の気配。
      ctx.save();
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

      for (const s of squadrons) {
        if (!s.visible || s.cleared) continue;
        if (s.spawned && s.state === SQUADRON_STATE.ACTIVE) continue;

        const sx = (s.x - player.x) * cameraScale + W / 2;
        const sy = (s.y - player.y) * cameraScale + battleH / 2;

        // 多少画面外でも端にクランプしてセンサー反応を見せる。
        const edge = 24;
        const bx = Math.max(edge, Math.min(W - edge, sx));
        const by = Math.max(edge, Math.min(battleH - edge, sy));

        const pulse = 0.5 + 0.5 * Math.sin(time * 0.08 + s.id);
        ctx.globalAlpha = 0.22 + pulse * 0.18;
        ctx.strokeStyle = s.type === 'commanderOnly' ? 'rgba(250,204,21,0.75)'
          : s.type === 'purpleRaiders' ? 'rgba(216,180,254,0.75)'
          : 'rgba(125,211,252,0.70)';
        ctx.lineWidth = 1.2;
        // 遠距離反応。
        // 円だけでなく、少し航路障害物っぽい横長シグナルにする。
        ctx.beginPath();
        ctx.ellipse(bx, by, 18 + pulse * 8, 8 + pulse * 2, 0, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(bx - 10, by);
        ctx.lineTo(bx + 10, by);
        ctx.stroke();

        ctx.fillStyle = ctx.strokeStyle;
        ctx.beginPath();
        ctx.arc(bx, by, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function init() {
      initSettingsPanel();
      resize();
      player.x = playerBaseX();
      player.y = playerBaseY();
      player.targetX = player.x;
      player.targetY = player.y;
      moveInput.targetX = player.x;
      moveInput.targetY = player.y;
      spawnFormation();
      seedSquadrons();
      requestAnimationFrame(loop);
    }

    function spawnFormation() {
      // クラシック編隊だけを差し替える。
      // 航路編隊（squadronId付き）は宇宙の記憶なので消さない。
      removeClassicEncounterEnemies();
      classicEncounter.anchorX = starOffsetX;
      classicEncounter.anchorY = starOffsetY;
      classicEncounter.cooldown = CLASSIC_ENCOUNTER_TUNING.respawnCooldown;
      classicEncounter.generation++;

      // 5段構成：
      // 最上部：編隊長
      // その下：護衛層
      // その下：紫横展開機
      // 下2段：通常機
      const cols = 7;
      const rows = 5;
      const enemyGapX = 38;
      const enemyGapY = 31;
      const sx = W / 2 - (cols - 1) * enemyGapX / 2;
      const sy = 42;
      const commanderCol = Math.floor(cols / 2);

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {

          // 最上段は中央の編隊長1機だけ。
          if (row === 0 && col !== commanderCol) continue;

          const isCommander = row === 0 && col === commanderCol;
          const isGuard = row === 1;
          const isPurple = row === 2;
          const isNormal = row >= 3;

          const hx = sx + col * enemyGapX;
          const hy = sy + row * enemyGapY;

          enemies.push({
            homeX: hx,
            homeY: hy,
            x: hx,
            y: hy,
            r: isCommander ? 12 : 9,
            state: 'sleep',
            phase: Math.random() * Math.PI * 2,
            hp: isCommander ? 2 : 1,
            role: isCommander ? 'commander' : (isGuard ? 'guard' : 'soldier'),
            commanderId: isCommander ? 'C1' : null,
            guardingCommanderId: isGuard ? 'C1' : null,
            alert: 0,
            diveT: 0,
            diveDelay: isCommander
              ? 320 + Math.random() * 300
              : isGuard
                ? 190 + Math.random() * 260
                : 120 + Math.random() * 240,
            type: isCommander ? 'commander'
              : isGuard ? 'guard'
              : isPurple ? 'purple'
              : (Math.random() < 0.08 ? 'angry' : 'normal'),
            rediveMax: 1,
            rediveCount: 0,
            evadeCharges: 999,
            evadeCooldown: 0,
            evadeOffsetX: 0,
            evadeOffsetY: 0,
            impactWarned: false,
            impactWarningLife: 0,
            squadronId: null,
            classicEncounter: true,
            classicGeneration: classicEncounter.generation
          });
        }
      }
    }

    function triggerBomb() {
      if (typeof activateBomb === 'function') {
        activateBomb();
      } else if (typeof bomb === 'function') {
        bomb();
      }
    }

    function triggerHomingMissile() {
      if (typeof activateHomingMissile === 'function') {
        activateHomingMissile();
      } else if (typeof fireHomingMissile === 'function') {
        fireHomingMissile();
      }
    }

    function shoot() {
      if (player.shotCooldown > 0) return;

      // ツインブラスター。
      // 発射間隔は従来のまま、1回のSHOTで左右2発を出す。
      // 狙いがシビアすぎる問題を少し緩和しつつ、ブラスター撃破の気持ちよさを上げる。
      bullets.push({ x: player.x - 5, y: player.y - 15, vx: 0, vy: -8, r: 3, life: 80 });
      bullets.push({ x: player.x + 5, y: player.y - 15, vx: 0, vy: -8, r: 3, life: 80 });

      player.shotCooldown = 18;
    }

    function throwBomb() {
      // 爆弾がすでに出ている場合は、Bボタンで任意起爆。
      if (bombs.length > 0) {
        const b = bombs[0];
        explode(b.x, b.y);
        bombs.splice(0, 1);
        player.bombCooldown = 38;
        return;
      }

      if (player.bombCooldown > 0) return;

      // 1回目のBで前方へ投げる。自動では爆発しない。
      bombs.push({
        x: player.x,
        y: player.y - 18,

        // 発射直後は自機の慣性を少し受け継ぎ、その場に残る。
        // 後退しながら投げると、近くの敵を迎撃しやすい。
        vx: player.vx * BOMB_PHYSICS.inheritedVelocityScale,
        vy: player.vy * BOMB_PHYSICS.inheritedVelocityScale,

        hold: BOMB_PHYSICS.holdFrames,
        r: 5,
        life: 520,
        armed: true
      });
      player.bombCooldown = 14;
      // 爆弾ズーム演出は一旦停止。
      // 演出的には良いが、戦況把握と空間感覚を崩しやすかった。
      // zoomPulse(1.40);
    }

    function boostToward(x, y) {
      if (player.boostCooldown > 0) return;
      const dx = x - player.x;
      const dy = y - player.y;
      const d = Math.hypot(dx, dy) || 1;
      player.vx += dx / d * 9.5;
      player.vy += dy / d * 9.5;
      player.boosting = 22;
      player.boostCooldown = 120;
      player.targetX = x;
      player.targetY = Math.min(y, battleH - 20);
      zoomPulse(1.15);
    }

    function enemyShoot(e) {
      // いまはランダムで2種類。
      // 将来的には敵キャラごとの兵装として分ける。
      if (Math.random() < 0.45) {
        enemyNeedleShot(e);
      } else {
        enemyAimedShot(e);
      }
    }

    function enemyAimedShot(e) {
      // 発射時点の自機位置を狙う従来型。
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const d = Math.hypot(dx, dy) || 1;
      const speed = e.type === 'angry' ? 3.7 : 3.1;
      enemyBullets.push({
        x: e.x,
        y: e.y,
        vx: dx / d * speed,
        vy: dy / d * speed,
        r: 3.5,
        life: 180,
        kind: 'aimed'
      });
    }

    function enemyNeedleShot(e) {
      // 伝統的な針弾。上方向、つまりマイナスY方向には撃てない。
      // 敵の横移動の慣性だけ少し乗せる。
      const inertiaX = Math.max(-1.2, Math.min(1.2, (e.meteorVX || 0) * 0.22));
      const driftX = inertiaX + ((e.diveDir || 0) * 0.35);
      const speedY = e.type === 'angry' ? 4.6 : 3.85;
      enemyBullets.push({
        x: e.x,
        y: e.y + 4,
        vx: driftX,
        vy: speedY,
        r: 2.5,
        life: 190,
        kind: 'needle'
      });
    }

    function wakeDormantEnemy(e, source = 'nearby') {
      if (!e || e.state !== 'sleep') return false;
      e.state = 'active';
      e.alert = 1;
      e.diveDelay = Math.min(e.diveDelay || 120, source === 'bomb' ? 36 + Math.random() * 70 : 52 + Math.random() * 90);
      e.wakeFlash = 34;
      for (let k = 0; k < 4; k++) {
        particles.push({
          x: e.x,
          y: e.y,
          vx: (Math.random() - 0.5) * 2.8,
          vy: (Math.random() - 0.5) * 2.8,
          life: 18 + Math.random() * 10,
          r: 1.4
        });
      }
      return true;
    }

    function wakeDormantEnemiesNear(x, y, radius, source = 'nearby') {
      let woke = 0;
      for (const e of enemies) {
        if (e.state !== 'sleep') continue;
        const d = Math.hypot(e.x - x, e.y - y);
        if (d < radius) {
          if (wakeDormantEnemy(e, source)) woke++;
        }
      }
      return woke;
    }

    function isDormantBumpTarget(e) {
      // 突撃中の敵との接触は別物。ここでは「隊列で待っている敵」だけを壁として扱う。
      return e && (e.state === 'sleep' || e.state === 'active');
    }

    function resolveDormantEnemyCollision(e, withEffect) {
      if (!isDormantBumpTarget(e)) return false;

      let dx = player.x - e.x;
      let dy = player.y - e.y;
      let d = Math.hypot(dx, dy);

      // ほぼ中心が重なった場合は、速度の逆向きへ逃がす。
      if (d < 0.001) {
        const v = Math.hypot(player.vx, player.vy) || 1;
        dx = -player.vx / v;
        dy = -player.vy / v;
        d = 1;
      }

      const nx = dx / d;
      const ny = dy / d;
      const minDist = player.r + e.r + DORMANT_BUMP.radiusPadding;
      const overlap = minDist - d;
      if (overlap <= 0) return false;

      // めり込み分は必ず世界側を押し戻す。
      // これがないと、反発演出があっても慣性で編隊の中を突破できてしまう。
      const pushOut = Math.min(DORMANT_BUMP.maxPushOut, overlap + DORMANT_BUMP.pushOutPadding);
      shiftWorld(-nx * pushOut, -ny * pushOut);

      // 進入方向の速度成分を反転する。
      // 単に加速を足すのではなく、壁に当たったように「ぽよーん」と跳ね返す。
      const inward = player.vx * nx + player.vy * ny;
      if (inward < 0) {
        player.vx -= (1 + DORMANT_BUMP.bounce) * inward * nx;
        player.vy -= (1 + DORMANT_BUMP.bounce) * inward * ny;
      }

      // 反発が弱すぎると押し負けて貫通感が出るので、最低限の跳ね返りを保証する。
      const outward = player.vx * nx + player.vy * ny;
      if (outward < DORMANT_BUMP.minBounceSpeed) {
        const add = DORMANT_BUMP.minBounceSpeed - outward;
        player.vx += nx * add;
        player.vy += ny * add;
      }

      if (withEffect) {
        player.bumpCooldown = DORMANT_BUMP.cooldown;
        player.bumpInvul = DORMANT_BUMP.invul;
        player.bumpFlash = DORMANT_BUMP.invul;

        // 相手側も少しだけ揺らす。隊列は後で自然に戻る。
        e.evadeOffsetX = (e.evadeOffsetX || 0) - nx * DORMANT_BUMP.enemyKick;
        e.evadeOffsetY = (e.evadeOffsetY || 0) - ny * DORMANT_BUMP.enemyKick;
        e.bumpLife = 20;

        // ぶつかった本人と周囲の浅い眠りを少し起こす。
        wakeDormantEnemy(e, 'bump');
        wakeDormantEnemiesNear(e.x, e.y, DORMANT_BUMP.wakeRadius, 'bump');

        for (let k = 0; k < 14; k++) {
          const a = Math.PI * 2 * k / 14;
          particles.push({
            x: (player.x + e.x) * 0.5,
            y: (player.y + e.y) * 0.5,
            vx: Math.cos(a) * (0.8 + Math.random() * 2.1),
            vy: Math.sin(a) * (0.8 + Math.random() * 2.1),
            life: 16 + Math.random() * 12,
            r: 1.7
          });
        }
      }

      return true;
    }

    function handleDormantEnemyBumps() {
      // クールダウン中でも「壁」としての押し戻しは続ける。
      // ただしエフェクト・起床・無敵付与は最初の接触時だけ。
      let effectUsed = player.bumpCooldown <= 0;

      // 複数機の隙間に入った場合も押し出せるよう、数回だけ解決する。
      for (let pass = 0; pass < 3; pass++) {
        let resolved = false;

        for (const e of enemies) {
          if (!isDormantBumpTarget(e)) continue;
          const d = Math.hypot(player.x - e.x, player.y - e.y);
          if (d < player.r + e.r + DORMANT_BUMP.radiusPadding) {
            if (resolveDormantEnemyCollision(e, effectUsed)) {
              resolved = true;
              effectUsed = false;
            }
          }
        }

        if (!resolved) break;
      }
    }

    function explode(x, y, maxR = 72) {
      explosions.push({ x, y, r: 8, maxR, life: 30 });
      wakeDormantEnemiesNear(x, y, maxR + WAKEUP_WEAPONS.bombWakeExtra, 'bomb');
      for (let i = 0; i < 26; i++) {
        const a = Math.PI * 2 * i / 26;
        particles.push({
          x, y,
          vx: Math.cos(a) * (1.3 + Math.random() * 2.5),
          vy: Math.sin(a) * (1.3 + Math.random() * 2.5),
          life: 28 + Math.random() * 12,
          r: 2
        });
      }
      // 爆発時ズームも停止。
      // 爆風エフェクトは残し、カメラだけ固定する。
      // zoomPulse(1.65);
    }

    function setVectorInput(x, y) {
      const cx = playerBaseX();
      const cy = playerBaseY();
      const rawDx = x - cx;
      const rawDy = y - cy;
      const dist = Math.hypot(rawDx, rawDy);
      if (dist < MOVE.deadZone) {
        moveInput.dx = 0;
        moveInput.dy = 0;
        moveInput.power = 0;
        return;
      }
      const clamped = Math.min(dist, MOVE.inputRadius);
      moveInput.dx = rawDx / dist;
      moveInput.dy = rawDy / dist;
      moveInput.power = (clamped - MOVE.deadZone) / (MOVE.inputRadius - MOVE.deadZone);
    }

    function requestGameFullscreen() {
      const el = document.documentElement;
      try {
        if (document.fullscreenElement) {
          if (document.exitFullscreen) document.exitFullscreen();
          return;
        }

        const req =
          el.requestFullscreen ||
          el.webkitRequestFullscreen ||
          el.msRequestFullscreen;

        if (req) req.call(el);

        // Android Chromeでは効く場合だけ横/縦のURLバー領域が消える。
        // 画面向きは縦持ち前提なのでロックしない。
      } catch (err) {
        console.log('fullscreen request failed', err);
      }
    }

    function handlePointer(x, y, type, e) {
      // スマホ仮想スティック。下部左側を親指操作に使う。
      if (isTouchLayout() && y >= battleH && x < W * 0.42) {
        if (type === 'down') {
          mobileStick.active = true;
          mobileStick.pointerId = e ? e.pointerId : null;
          setMobileStickFromPointer(x, y);
        } else if (type === 'move' && mobileStick.active && (!e || e.pointerId === mobileStick.pointerId)) {
          setMobileStickFromPointer(x, y);
        }
        return;
      }

      const btn = buttons.find(b => x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h);
      if (btn && type === 'down') {
        if (btn.label === 'SHOT') shoot();
        if (btn.label === 'BOMB') throwBomb();
        if (btn.label === 'BOOST') boostToward(player.x + moveInput.dx * 120, player.y + moveInput.dy * 120);
        if (btn.label === 'FULL') requestGameFullscreen();
        btn.down = true;
        return;
      }

      if (y >= battleH) return;

      if (type === 'down') {
        moveInput.active = true;
        moveInput.pointerId = e ? e.pointerId : null;
        moveInput.lastX = x;
        moveInput.lastY = y;
        moveInput.targetX = x;
        moveInput.targetY = y;
        if (moveInput.mode === 'vector') setVectorInput(x, y);
      } else if (type === 'move' && moveInput.active) {
        if (moveInput.mode === 'dragworld') {
          const dx = x - moveInput.lastX;
          const dy = y - moveInput.lastY;
          player.vx += dx * MOVE.dragSensitivity;
          player.vy += dy * MOVE.dragSensitivity;
          moveInput.dx = dx;
          moveInput.dy = dy;
          moveInput.power = Math.min(1, Math.hypot(dx, dy) / 42);
          moveInput.lastX = x;
          moveInput.lastY = y;
        } else if (moveInput.mode === 'tap') {
          moveInput.targetX = x;
          moveInput.targetY = y;
        } else if (moveInput.mode === 'vector') {
          setVectorInput(x, y);
        }
      }
    }

    canvas.addEventListener('pointerdown', e => {
      canvas.setPointerCapture(e.pointerId);
      handlePointer(e.clientX, e.clientY, 'down', e);
    });
    canvas.addEventListener('pointermove', e => {
      if (e.buttons || e.pointerType === 'touch') handlePointer(e.clientX, e.clientY, 'move', e);
    });
    canvas.addEventListener('pointerup', e => {
      buttons.forEach(b => b.down = false);

      if (mobileStick.pointerId === e.pointerId || mobileStick.pointerId === null) {
        mobileStick.active = false;
        mobileStick.pointerId = null;
        mobileStick.dx = 0;
        mobileStick.dy = 0;
        mobileStick.power = 0;
      }

      if (moveInput.pointerId === e.pointerId || moveInput.pointerId === null) {
        moveInput.active = false;
        moveInput.pointerId = null;
        if (moveInput.mode !== 'dragworld') {
          moveInput.dx = 0;
          moveInput.dy = 0;
          moveInput.power = 0;
        }
      }
    });

    canvas.addEventListener('pointercancel', e => {
      buttons.forEach(b => b.down = false);
      mobileStick.active = false;
      mobileStick.pointerId = null;
      mobileStick.dx = 0;
      mobileStick.dy = 0;
      mobileStick.power = 0;
      moveInput.active = false;
      moveInput.pointerId = null;
    });


    function buttonPressed(gp, index) {
      return !!(gp.buttons[index] && gp.buttons[index].pressed);
    }

    function buttonJustPressed(gp, index) {
      const now = buttonPressed(gp, index);
      const before = !!gamepadState.prevButtons[index];
      return now && !before;
    }

    function cycleMoveMode() {
      if (moveInput.mode === 'dragworld') moveInput.mode = 'tap';
      else if (moveInput.mode === 'tap') moveInput.mode = 'vector';
      else moveInput.mode = 'dragworld';
    }


    function readHatAxis(value) {
      // HORI Fighting Stick mini の AX9 実測値に合わせた専用マップ。
      // 実測：
      // 上=-1.0 / 右上=-0.71429 / 右=-0.42857 / 右下=-0.14286
      // 下=0.14286 / 左下=0.42857 / 左=0.71429 / 左上=1.0 / 中立=3.28571
      if (value === undefined || value === null || Number.isNaN(value)) return { x: 0, y: 0, name: 'none', raw: value };

      const DIAG = Math.SQRT1_2;
      const directions = [
        { v: 3.28571, x: 0,     y: 0,     name: 'CENTER'    },
        { v: -1.00000, x: 0,     y: -1,    name: 'UP'        },
        { v: -0.71429, x: DIAG,  y: -DIAG, name: 'RIGHT_UP'  },
        { v: -0.42857, x: 1,     y: 0,     name: 'RIGHT'     },
        { v: -0.14286, x: DIAG,  y: DIAG,  name: 'RIGHT_DOWN'},
        { v: 0.14286,  x: 0,     y: 1,     name: 'DOWN'      },
        { v: 0.42857,  x: -DIAG, y: DIAG,  name: 'LEFT_DOWN' },
        { v: 0.71429,  x: -1,    y: 0,     name: 'LEFT'      },
        { v: 1.00000,  x: -DIAG, y: -DIAG, name: 'LEFT_UP'   }
      ];

      let best = directions[0];
      let bestDiff = Infinity;
      for (const d of directions) {
        const diff = Math.abs(value - d.v);
        if (diff < bestDiff) {
          best = d;
          bestDiff = diff;
        }
      }

      // 中立値はかなり離れているので広め。それ以外は実測値に近い場合だけ採用。
      if (best.name === 'CENTER' && bestDiff < 0.25) return { x: 0, y: 0, name: best.name, raw: value };
      if (bestDiff < 0.09) return { x: best.x, y: best.y, name: best.name, raw: value };

      return { x: 0, y: 0, name: '?', raw: value };
    }

    function pollGamepad() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      const gp = Array.from(pads).find(p => p && p.connected);

      if (!gp) {
        gamepadState.active = false;
        gamepadState.name = '';
        gamepadState.dx = 0;
        gamepadState.dy = 0;
        gamepadState.power = 0;
        return;
      }

      gamepadState.active = true;
      gamepadState.name = gp.id || 'GAMEPAD';

      // ボタン操作。押した瞬間だけ発火させる。
      if (buttonJustPressed(gp, GAMEPAD.shotButton)) shoot();
      if (buttonJustPressed(gp, GAMEPAD.bombButton)) throwBomb();
      if (buttonJustPressed(gp, GAMEPAD.boostButton)) {
        boostToward(player.x + gamepadState.dx * 140, player.y + gamepadState.dy * 140);
      }
      if (buttonJustPressed(gp, GAMEPAD.modeButton)) cycleMoveMode();

      // 方向入力。
      // 1) 通常のアナログ軸 axes[0]/axes[1]
      // 2) 標準D-padボタン 12-15
      // 3) HORIなどのHAT軸 axes[9]
      let ax = gp.axes[0] || 0;
      let ay = gp.axes[1] || 0;

      const dpadX = (buttonPressed(gp, 15) ? 1 : 0) - (buttonPressed(gp, 14) ? 1 : 0);
      const dpadY = (buttonPressed(gp, 13) ? 1 : 0) - (buttonPressed(gp, 12) ? 1 : 0);
      const hat = readHatAxis(gp.axes[9]);

      if (Math.abs(ax) < GAMEPAD.deadZone && Math.abs(ay) < GAMEPAD.deadZone) {
        if (dpadX || dpadY) {
          ax = dpadX;
          ay = dpadY;
        } else if (hat.x || hat.y) {
          ax = hat.x;
          ay = hat.y;
        }
      }

      const mag = Math.hypot(ax, ay);
      if (mag > GAMEPAD.deadZone) {
        const ux = ax / mag;
        const uy = ay / mag;
        gamepadState.dx = ux;
        gamepadState.dy = uy;
        gamepadState.power = Math.min(1, mag);
        gamepadState.hatName = hat.name || '';
        gamepadState.hatRaw = hat.raw;
      } else {
        gamepadState.dx = 0;
        gamepadState.dy = 0;
        gamepadState.power = 0;
        gamepadState.hatName = hat.name || '';
        gamepadState.hatRaw = hat.raw;
      }

      gamepadState.prevButtons = gp.buttons.map(b => !!b.pressed);
    }

    window.addEventListener('gamepadconnected', e => {
      gamepadState.name = e.gamepad.id || 'GAMEPAD';
    });

    window.addEventListener('gamepaddisconnected', () => {
      gamepadState.name = '';
      gamepadState.active = false;
    });

    window.addEventListener('keydown', e => {
      if (e.code === 'Space') shoot();
      if (e.code === 'KeyB') throwBomb();
      if (e.code === 'KeyM') cycleMoveMode();
      if (e.code === 'KeyZ') cycleZoom();
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') boostToward(player.x + moveInput.dx * 120, player.y + moveInput.dy * 120);
      const step = 0.8;
      if (e.code === 'ArrowLeft') player.vx -= step;
      if (e.code === 'ArrowRight') player.vx += step;
      if (e.code === 'ArrowUp') player.vy -= step;
      if (e.code === 'ArrowDown') player.vy += step;
    });

    function computeCombatDanger() {
      if (!STABILIZER.enabled) return 0;

      let danger = 0;

      // 敵弾が近いほど危険度を上げる。
      for (const b of enemyBullets) {
        const d = Math.hypot(b.x - player.x, b.y - player.y);
        if (d < STABILIZER.bulletRadius) {
          danger = Math.max(danger, 1 - d / STABILIZER.bulletRadius);
        }
      }

      // 飛行中の敵機が近いときも危険度を上げる。
      for (const e of enemies) {
        if (e.state !== 'dive') continue;
        if (e.type === 'angry' && e.meteorInit && !e.meteorLaunched) continue; // 警告中メテオは除外
        const d = Math.hypot(e.x - player.x, e.y - player.y);
        if (d < STABILIZER.enemyRadius) {
          danger = Math.max(danger, 1 - d / STABILIZER.enemyRadius);
        }
      }

      return Math.max(0, Math.min(STABILIZER.maxDanger, danger));
    }

    // ===== HORI風 8方向デジタル入力 =====
    // カーソルキーは「推進」ではなく、
    // 倒した方向へ一定入力を与える。
    const keyState = {
      up: false,
      down: false,
      left: false,
      right: false
    };

    addEventListener('keydown', e => {
      const k = e.key;
      if (k === 'ArrowUp') keyState.up = true;
      if (k === 'ArrowDown') keyState.down = true;
      if (k === 'ArrowLeft') keyState.left = true;
      if (k === 'ArrowRight') keyState.right = true;
    });

    addEventListener('keyup', e => {
      const k = e.key;
      if (k === 'ArrowUp') keyState.up = false;
      if (k === 'ArrowDown') keyState.down = false;
      if (k === 'ArrowLeft') keyState.left = false;
      if (k === 'ArrowRight') keyState.right = false;
    });

    const keyboardStick = {
      active: false,
      dx: 0,
      dy: 0,
      power: 0
    };

    const mobileStick = {
      active: false,
      pointerId: null,
      cx: 0,
      cy: 0,
      knobX: 0,
      knobY: 0,
      dx: 0,
      dy: 0,
      power: 0,
      radius: 40,
      responseBoost: 1.28,
      accelBoost: 1.05
    };

    function mobileStickCenter() {
      return {
        x: W * 0.22,
        y: battleH + panelH * 0.56
      };
    }

    function setMobileStickFromPointer(x, y) {
      const c = mobileStickCenter();
      mobileStick.cx = c.x;
      mobileStick.cy = c.y;

      const rawX = x - c.x;
      const rawY = y - c.y;
      const dist = Math.hypot(rawX, rawY);
      const dead = 6;
      const r = mobileStick.radius;

      if (dist < dead) {
        mobileStick.dx = 0;
        mobileStick.dy = 0;
        mobileStick.power = 0;
        mobileStick.knobX = c.x;
        mobileStick.knobY = c.y;
        return;
      }

      const clamped = Math.min(dist, r);
      mobileStick.dx = rawX / dist;
      mobileStick.dy = rawY / dist;

      // Xboxコントローラーに近い反応へ。
      // 少し倒しただけでも十分推力が出るように、入力カーブを持ち上げる。
      const linearPower = Math.min(1, (clamped - dead) / (r - dead));
      mobileStick.power = Math.min(1, Math.pow(linearPower, 0.90) * mobileStick.responseBoost);

      mobileStick.knobX = c.x + mobileStick.dx * clamped;
      mobileStick.knobY = c.y + mobileStick.dy * clamped;
    }

    function updateKeyboardMove() {
      let x = 0;
      let y = 0;

      if (keyState.left) x -= 1;
      if (keyState.right) x += 1;
      if (keyState.up) y -= 1;
      if (keyState.down) y += 1;

      // 斜め移動を正規化
      const len = Math.hypot(x, y);
      if (len > 0) {
        x /= len;
        y /= len;
        keyboardStick.active = true;
        keyboardStick.dx = x;
        keyboardStick.dy = y;
        keyboardStick.power = 1.0;
      } else {
        keyboardStick.active = false;
        keyboardStick.dx = 0;
        keyboardStick.dy = 0;
        keyboardStick.power = 0;
      }
    }

    function updateMovementInput() {
      pollGamepad();

      if (moveInput.mode === 'dragworld') {
        player.vx *= MOVE.friction;
        player.vy *= MOVE.friction;
      } else if (moveInput.mode === 'tap') {
        const dx = moveInput.targetX - player.x;
        const dy = moveInput.targetY - player.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 4) {
          const ux = dx / dist;
          const uy = dy / dist;
          const power = Math.min(1, dist / 180);
          const thrust = MOVE.accel * (0.25 + power * 0.75);
          player.vx += ux * thrust;
          player.vy += uy * thrust;
          player.vx *= MOVE.activeFriction;
          player.vy *= MOVE.activeFriction;
          moveInput.dx = ux;
          moveInput.dy = uy;
          moveInput.power = power;
        } else {
          player.vx *= MOVE.friction;
          player.vy *= MOVE.friction;
        }
      } else if (moveInput.mode === 'vector') {
        if (moveInput.active && moveInput.power > 0) {
          const thrust = MOVE.accel * moveInput.power;
          player.vx += moveInput.dx * thrust;
          player.vy += moveInput.dy * thrust;
          player.vx *= MOVE.activeFriction;
          player.vy *= MOVE.activeFriction;
        } else {
          player.vx *= MOVE.friction;
          player.vy *= MOVE.friction;
        }
      }

      // ゲームパッド入力は、現在のタッチ操作モードに重ねて使える。
      // Fighting Stick のようなデジタル方向入力でも、軽い慣性つきで動く。
      if (gamepadState.active && gamepadState.power > 0) {
        const thrust = GAMEPAD.accel * (0.35 + gamepadState.power * 0.65);
        player.vx += gamepadState.dx * thrust;
        player.vy += gamepadState.dy * thrust;
        player.vx *= MOVE.activeFriction;
        player.vy *= MOVE.activeFriction;
        moveInput.dx = gamepadState.dx;
        moveInput.dy = gamepadState.dy;
        moveInput.power = gamepadState.power;
      }

      // キーボードもHORIジョイスティックと同じ「デジタル8方向スティック」として扱う。
      if (keyboardStick.active && keyboardStick.power > 0) {
        const thrust = GAMEPAD.accel * (0.35 + keyboardStick.power * 0.65);
        player.vx += keyboardStick.dx * thrust;
        player.vy += keyboardStick.dy * thrust;
        player.vx *= MOVE.activeFriction;
        player.vy *= MOVE.activeFriction;
        moveInput.dx = keyboardStick.dx;
        moveInput.dy = keyboardStick.dy;
        moveInput.power = keyboardStick.power;
      }

      // スマホ仮想スティック。
      // Xbox感を保ちつつ、スマホだけ少し俊敏にする。
      if (mobileStick.active && mobileStick.power > 0) {
        const thrust = GAMEPAD.accel * mobileStick.accelBoost * (0.35 + mobileStick.power * 0.65);
        player.vx += mobileStick.dx * thrust;
        player.vy += mobileStick.dy * thrust;

        // 親指操作では、少しだけ姿勢制御を強めて小回りを良くする。
        player.vx *= 0.988;
        player.vy *= 0.988;

        moveInput.dx = mobileStick.dx;
        moveInput.dy = mobileStick.dy;
        moveInput.power = mobileStick.power;
      }
    }

    function isClassicScrambleMode() {
      let alive = 0;
      for (const e of enemies) {
        if (e.state === 'gone') continue;
        if (!isClassicEnemy(e)) continue;

        // スクランブル判定では護衛を数えない。
        // 編隊長の護衛補充で残存数が増え、スクランブルが解除されるのを防ぐ。
        if (e.role === 'guard') continue;

        alive++;
      }
      return alive > 0 && alive <= SCRAMBLE.threshold;
    }

    function isScrambleMode(e = null) {
      // ここが今回の要点。
      // スクランブルかどうかは全体ではなく、所属編隊ごとに決める。
      // これで「小隊は散るが、大型編隊は美しく隊列へ戻る」が両立する。
      if (e && e.squadronId != null) {
        const s = getSquadronById(e.squadronId);
        return isSquadronScramble(s);
      }

      // クラシック編隊だけは従来の残数判定を残す。
      return isClassicScrambleMode();
    }

    function countActiveDivers() {
      let count = 0;
      for (const e of enemies) {
        if (e.state === 'dive') count++;
      }
      return count;
    }

    function spawnReinforcementGuard(commander, offsetX, offsetY) {
      const g = {
        homeX: commander.homeX + offsetX,
        homeY: commander.homeY + offsetY,
        x: commander.x + offsetX,
        y: commander.y + offsetY,
        r: 9,
        state: 'active',
        phase: Math.random() * Math.PI * 2,
        hp: 1,
        role: 'guard',
        commanderId: null,
        guardingCommanderId: commander.commanderId,
        squadronId: commander.squadronId || null,
        alert: 1,
        diveT: 0,
        diveDelay: 0,
        type: 'guard',
        rediveMax: 1,
        rediveCount: 0,
        evadeCharges: 999,
        evadeCooldown: 0,
        evadeOffsetX: 0,
        evadeOffsetY: 0,
        impactWarned: false,
        impactWarningLife: 0,
        reinforcement: true,
        warpInLife: 42
      };
      enemies.push(g);
      return g;
    }

    function commanderHasGuard(commander) {
      if (!commander || !commander.commanderId) return false;
      return enemies.some(e =>
        e.guardingCommanderId === commander.commanderId &&
        e.state !== 'gone'
      );
    }

    function getFormationCenter() {
      const formationEnemies = enemies.filter(e =>
        e.state === 'sleep' || e.state === 'active'
      );

      if (formationEnemies.length === 0) return null;

      let sx = 0;
      let sy = 0;

      for (const e of formationEnemies) {
        sx += e.x;
        sy += e.y;
      }

      return {
        x: sx / formationEnemies.length,
        y: sy / formationEnemies.length
      };
    }

    function formationOffscreenInfo() {
      const fc = getFormationCenter();
      if (!fc) return null;

      const sx = (fc.x - player.x) * cameraScale + W / 2;
      const sy = (fc.y - player.y) * cameraScale + battleH / 2;

      const margin = 80;

      const offscreen =
        sx < margin || sx > W - margin ||
        sy < margin || sy > battleH - margin;

      if (!offscreen) return null;

      return {
        screenX: sx,
        screenY: sy,
        dx: sx - W / 2,
        dy: sy - battleH / 2
      };
    }

    function update() {
      time++;
      updateSquadrons();
      updateSquadronBattleModes();
      let baseZoom = autoZoom ? computeAutoZoom() : ZOOM_LEVELS[zoomIndex];
      baseZoom = applyIntroZoomOutSuppression(baseZoom);

      // ズーム不感帯。
      // 隊列フィット計算の微細な変動で画面が脈動しないよう、
      // 小さなズーム差は無視して現在の目標倍率を維持する。
      if (Math.abs(baseZoom - targetScale) < 0.08) {
        baseZoom = targetScale;
      }

      // ズーム変化速度を非対称にする。
      // 接近戦へ寄るズームインは少し速く、隊列を収めるためのズームアウトはゆっくり。
      // これで、敵が通り過ぎた直後の過剰な脈動を抑える。
      const reveal = getUniverseReveal();
      const zoomingIn = baseZoom > targetScale;
      const zoomOutFollow = reveal >= 0.999
        ? Math.max(0.024, SETTINGS.zoomFollow * 0.62)  // 開示後はちゃんと広域へ戻る
        : Math.max(0.004, SETTINGS.zoomFollow * 0.16); // 開示中はゆっくり広がる
      const targetFollow = zoomingIn
        ? Math.max(0.135, SETTINGS.zoomFollow * 2.25)
        : zoomOutFollow;
      targetScale += (baseZoom - targetScale) * targetFollow;

      const cameraFollow = targetScale > cameraScale ? 0.220 : (reveal >= 0.999 ? 0.055 : 0.030);
      cameraScale += (targetScale - cameraScale) * cameraFollow;

      player.shotCooldown = Math.max(0, player.shotCooldown - 1);
      player.bombCooldown = Math.max(0, player.bombCooldown - 1);
      player.boostCooldown = Math.max(0, player.boostCooldown - 1);
      player.boosting = Math.max(0, player.boosting - 1);
      player.bumpCooldown = Math.max(0, (player.bumpCooldown || 0) - 1);
      player.bumpInvul = Math.max(0, (player.bumpInvul || 0) - 1);
      player.bumpFlash = Math.max(0, (player.bumpFlash || 0) - 1);

      // キーボードはHORI風の8方向デジタル入力。
      updateKeyboardMove();

      updateMovementInput();

      const speed = Math.hypot(player.vx, player.vy);
      // スマホでは少しだけ最高速を下げ、編隊近接時の事故を減らす。
      const maxSpeedNow = isTouchLayout() ? MOVE.maxSpeed * SETTINGS.mobileMaxSpeedScale : MOVE.maxSpeed;
      if (speed > maxSpeedNow) {
        player.vx = player.vx / speed * maxSpeedNow;
        player.vy = player.vy / speed * maxSpeedNow;
      }

      // スマホ：編隊近接時は少し姿勢制御を強める。
      // 下から接近したときの「突っ込み事故」を減らす。
      if (isTouchLayout()) {
        let nearestFormation = Infinity;

        for (const e of enemies) {
          if (e.state !== 'sleep' && e.state !== 'active') continue;
          const d = Math.hypot(e.x - player.x, e.y - player.y);
          if (d < nearestFormation) nearestFormation = d;
        }

        if (nearestFormation < 170) {
          player.vx *= 0.978;
          player.vy *= 0.978;
        }
      }

      // Combat Stabilizer:
      // 危険が近いときだけ速度を少し減衰し、弾幕や接近機の間で小回りを利かせる。
      // 宇宙の法則ではなく、機体の姿勢制御AIとして扱う。
      const danger = computeCombatDanger();
      if (danger > 0) {
        const damping = 1 - STABILIZER.extraDamping * danger;
        player.vx *= damping;
        player.vy *= damping;
      }

      shiftWorld(-player.vx, -player.vy);

      const targetOffsetX = -player.vx * 4.2;
      const targetOffsetY = -player.vy * 4.2;
      player.displayOffsetX += (targetOffsetX - player.displayOffsetX) * MOVE.shipLag;
      player.displayOffsetY += (targetOffsetY - player.displayOffsetY) * MOVE.shipLag;
      player.displayOffsetX = Math.max(-MOVE.maxShipOffset, Math.min(MOVE.maxShipOffset, player.displayOffsetX));
      player.displayOffsetY = Math.max(-MOVE.maxShipOffset, Math.min(MOVE.maxShipOffset, player.displayOffsetY));
      player.x = playerBaseX() + player.displayOffsetX;
      player.y = playerBaseY() + player.displayOffsetY;

      handleDormantEnemyBumps();

      bullets.forEach(b => { b.x += b.vx; b.y += b.vy; b.life--; });
      enemyBullets.forEach(b => { b.x += b.vx; b.y += b.vy; b.life--; });
      bombs.forEach(b => {
        if (b.hold > 0) {
          // 慣性滞留フェーズ。
          // 自機周辺の空間に少しだけ置かれ、速度がじわっと抜ける。
          b.hold--;
          b.x += b.vx;
          b.y += b.vy;
          b.vx *= 0.90;
          b.vy *= 0.90;

          // 滞留が終わったら前方へ投げ出される。
          if (b.hold <= 0) {
            b.vx *= 0.35;
            b.vy = BOMB_PHYSICS.forwardVy;
          }
        } else {
          b.x += b.vx;
          b.y += b.vy;
          b.vy *= 0.996;
        }
        b.life--;
      });

      for (let i = bombs.length - 1; i >= 0; i--) {
        // 画面外や寿命切れでは不発扱いで消える。
        if (bombs[i].life <= 0 || bombs[i].y < -40 || bombs[i].x < -40 || bombs[i].x > W + 40) {
          bombs.splice(i, 1);
        }
      }
      for (let i = bullets.length - 1; i >= 0; i--) {
        if (bullets[i].life <= 0 || bullets[i].y < -20) bullets.splice(i, 1);
      }
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        if (b.life <= 0 || b.x < -40 || b.x > W + 40 || b.y < -40 || b.y > battleH + 40) {
          enemyBullets.splice(i, 1);
        }
      }

      enemies.forEach((e, idx) => {
        e.evadeCooldown = Math.max(0, (e.evadeCooldown || 0) - 1);
        e.evadeFlash = Math.max(0, (e.evadeFlash || 0) - 1);
        e.wakeFlash = Math.max(0, (e.wakeFlash || 0) - 1);
        e.bumpLife = Math.max(0, (e.bumpLife || 0) - 1);
        e.evadeOffsetX *= 0.94;
        e.evadeOffsetY *= 0.94;

        // 練度のある敵は、近づく通常弾を見切って隊列を割るように避ける。
        // 連射で一瞬に削れないよう、回避後にはクールダウンを置く。
        if (e.state === 'active' && e.evadeCooldown <= 0) {
          for (const b of bullets) {
            const approaching = b.vy < 0 && b.y > e.y;
            const closeX = Math.abs(b.x - e.x) < 22;
            const closeY = b.y - e.y < 66 && b.y - e.y > 0;
            if (approaching && closeX && closeY) {
              const side = e.x < W / 2 ? -1 : 1;
              const dodgeDir = (b.x < e.x ? 1 : -1) || side;

              // 見た目に分かるように、まず即座にスッと横へ動かす。
              // その後、evadeOffsetでしばらく隊列が割れた状態を残す。
              e.x += dodgeDir * 18;
              e.y -= 3;
              e.evadeOffsetX += dodgeDir * 64;
              e.evadeOffsetY += -8;
              // 回避回数制限はなくす。かわりにクールダウンだけで制御する。
              // 弾速や位置関係によっては、避けようとしても当たる。
              e.evadeCooldown = 52;
              e.evadeFlash = 28;
              for (let k = 0; k < 4; k++) {
                particles.push({ x: e.x, y: e.y, vx: -dodgeDir * (0.8 + Math.random()*1.4), vy: (Math.random()-0.5)*1.2, life: 14, r: 1.2 });
              }
